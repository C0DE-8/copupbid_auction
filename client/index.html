    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://copupbid.com/#organization",
            "name": "CopUpBid",
            "url": "https://copupbid.com/",
            "logo": {
              "@type": "ImageObject",
              "url": "https://copupbid.com/android-chrome-512x512.png",
              "width": 512,
              "height": 512
            },
            "image": "https://copupbid.com/android-chrome-512x512.png",
            "foundingDate": "2023",
            "description": "CopUpBid is a Nigerian auction e-commerce platform where shoppers bid, shop, and win products with CopUpCoin.",
            "contactPoint": [
              {
                "@type": "ContactPoint",
                "email": "support@copupbid.com",
                "contactType": "customer support",
                "availableLanguage": ["en"]
              }
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://copupbid.com/#website",
            "url": "https://copupbid.com/",
            "name": "CopUpBid",
            "publisher": { "@id": "https://copupbid.com/#organization" },
            "inLanguage": "en-NG",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://copupbid.com/shop?search={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "OnlineStore",
            "@id": "https://copupbid.com/#store",
            "name": "CopUpBid Auction Shop",
            "url": "https://copupbid.com/",
            "image": "https://copupbid.com/android-chrome-512x512.png",
            "description": "Auction e-commerce marketplace for live auctions, product drops, direct shopping, favorites, cart, checkout, CopUpCoin bidding, and winner history.",
            "currenciesAccepted": "NGN",
            "paymentAccepted": "CopUpCoin, bank transfer, online payment",
            "areaServed": {
              "@type": "Country",
              "name": "Nigeria"
            },
            "parentOrganization": { "@id": "https://copupbid.com/#organization" }
          },
          {
            "@type": "FAQPage",
            "@id": "https://copupbid.com/#auction-faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What is CopUpBid?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "CopUpBid is a Nigerian auction e-commerce platform where users browse products, use CopUpCoin, join auctions, shop deals, track winners, and manage orders."
                }
              },
              {
                "@type": "Question",
                "name": "How do CopUpBid auctions work?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Users create an account, load eligible CopUpCoin or bid points, join available auctions, place valid bids, and the highest verified bidder can win when the auction closes."
                }
              },
              {
                "@type": "Question",
                "name": "What can I shop on CopUpBid?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "CopUpBid can list electronics, phones, laptops, fashion, beauty items, home goods, gadgets, collectibles, gift items, and seasonal product drops for shopping or auction events."
                }
              }
            ]
          }
        ]
      }
    </script>
