<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Payment Result - CopUpBid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(
          circle at top left,
          rgba(16, 185, 129, 0.18),
          transparent 55%
        ),
        radial-gradient(
          circle at top right,
          rgba(52, 211, 153, 0.12),
          transparent 55%
        ),
        radial-gradient(
          circle at bottom,
          rgba(20, 184, 166, 0.16),
          transparent 55%
        ),
        #020617;
    }

    .glass-effect {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.8);
    }
  </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full">
    <div class="glass-effect rounded-3xl p-8 text-center">
      <div id="statusIcon" class="mb-4"></div>

      <h1
        id="statusTitle"
        class="text-2xl font-semibold mb-2 tracking-tight"
      >
        Processing...
      </h1>
      <p id="statusMessage" class="text-sm text-slate-300 mb-6">
        Please wait while we confirm your payment.
      </p>

      <div
        id="summaryBox"
        class="bg-slate-900/70 rounded-2xl border border-slate-700/70 p-4 text-left mb-6 hidden"
      >
        <div class="flex justify-between text-sm mb-2">
          <span class="text-slate-400">Amount paid</span>
          <span id="summaryAmount" class="font-semibold text-slate-100">
            —
          </span>
        </div>
        <div class="flex justify-between text-sm mb-2">
          <span class="text-slate-400">Credited CopUp Coin</span>
          <span
            id="summaryCoins"
            class="font-semibold text-emerald-300 text-sm"
            >—</span
          >
        </div>
        <div class="border-t border-slate-700/70 mt-3 pt-3 text-xs">
          <p id="summaryExtra" class="text-slate-400">
            Your updated balance will be visible on your next refresh.
          </p>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button
          type="button"
          onclick="goToCoinVault()"
          class="w-full sm:w-auto px-5 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-sm font-medium flex items-center justify-center gap-2"
        >
          <span>Go to CopUp Coin Vault</span>
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 7h5m0 0v5m0-5L10 15"
            ></path>
          </svg>
        </button>

        <button
          type="button"
          onclick="goHome()"
          class="w-full sm:w-auto px-5 py-2.5 rounded-xl border border-slate-600 text-sm font-medium text-slate-200 hover:bg-slate-800/70"
        >
          Back to Dashboard
        </button>
      </div>

      <p class="mt-4 text-[11px] text-slate-500">
        If your balance does not update after a few minutes, contact support
        with your transaction reference.
      </p>
    </div>
  </div>

  <script>
    function parseQuery() {
      const params = new URLSearchParams(window.location.search);
      return {
        status: params.get("status") || "",
        coins: params.get("coins") || "",
        amount: params.get("amount") || "",
        reason: params.get("reason") || "",
      };
    }

    function goToCoinVault() {
      // adjust path to your actual coin vault page
      window.location.href = "https://copupbid.com/pages/coin-topup.html";
    }

    function goHome() {
      // adjust to your main dashboard route
      window.location.href = "https://copupbid.com/pages/dashboard";
    }

    function renderStatus() {
      const { status, coins, amount, reason } = parseQuery();

      const statusIcon = document.getElementById("statusIcon");
      const statusTitle = document.getElementById("statusTitle");
      const statusMessage = document.getElementById("statusMessage");
      const summaryBox = document.getElementById("summaryBox");
      const summaryAmount = document.getElementById("summaryAmount");
      const summaryCoins = document.getElementById("summaryCoins");
      const summaryExtra = document.getElementById("summaryExtra");

      if (!status) {
        statusIcon.innerHTML = `
          <div class="w-14 h-14 rounded-full bg-yellow-500/20 border border-yellow-400/60 flex items-center justify-center mx-auto">
            <span class="text-2xl">⚠️</span>
          </div>
        `;
        statusTitle.textContent = "No payment information";
        statusMessage.textContent =
          "We couldn't detect any payment status in the URL.";
        return;
      }

      if (status === "success") {
        statusIcon.innerHTML = `
          <div class="w-16 h-16 rounded-full bg-emerald-500/20 border border-emerald-400/70 flex items-center justify-center mx-auto">
            <svg class="w-8 h-8 text-emerald-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
          </div>
        `;
        statusTitle.textContent = "Payment successful 🎉";
        statusMessage.textContent =
          "Your CopUp Coin top-up has been confirmed.";

        summaryAmount.textContent = amount
          ? `$${Number(amount).toFixed(2)}`
          : "—";
        summaryCoins.textContent = coins
          ? `${coins} CopUp Coin`
          : "—";
        summaryExtra.textContent =
          "Your CopUp balance should update shortly. If it doesn’t, refresh your vault or contact support with your transaction reference.";
        summaryBox.classList.remove("hidden");
      } else {
        statusIcon.innerHTML = `
          <div class="w-16 h-16 rounded-full bg-red-500/20 border border-red-400/70 flex items-center justify-center mx-auto">
            <svg class="w-8 h-8 text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
        `;
        statusTitle.textContent = "Payment failed";
        statusMessage.textContent =
          reason ||
          "Your payment could not be confirmed. No CopUp Coin was credited.";

        if (amount || coins) {
          summaryAmount.textContent = amount
            ? `$${Number(amount).toFixed(2)}`
            : "—";
          summaryCoins.textContent = coins
            ? `${coins} CopUp Coin (not credited)`
            : "—";
          summaryExtra.textContent =
            "If money was debited from your account, please contact support with your transaction reference.";
          summaryBox.classList.remove("hidden");
        }
      }
    }

    window.addEventListener("DOMContentLoaded", renderStatus);
  </script>
</body>
</html>
