<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Admin • Coin Rate & Purchases</title>

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 500: '#10b981', 600: '#059669' },
            accent:{ 500: '#3b82f6' }
          }
        }
      }
    }
  </script>
  <!-- Axios (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 1rem;
      backdrop-filter: blur(6px);
    }
    .ring-soft { box-shadow: 0 0 0 6px rgba(16,185,129,.12); }
    .badge {
      display:inline-flex; align-items:center; gap:.5rem;
      padding:.25rem .5rem; border-radius:.5rem; font-size:.75rem;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
    }
    
    /* Enhanced toast notifications with animations and better styling */
    .toast{
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      min-width: 320px; max-width: 480px;
      padding: 1rem 1.25rem; border-radius: 12px;
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: 0 20px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.05);
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #f1f5f9; 
      display: none;
      white-space: pre-wrap;
      transform: translateX(100%);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(12px);
    }
    .toast.show {
      display: block;
      transform: translateX(0);
    }
    .toast.ok{ 
      border-color: rgba(16,185,129,.4); 
      background: linear-gradient(135deg, #064e3b 0%, #022c22 100%);
      box-shadow: 0 20px 40px rgba(0,0,0,.6), 0 0 20px rgba(16,185,129,.2);
    }
    .toast.err{ 
      border-color: rgba(239,68,68,.5); 
      background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
      box-shadow: 0 20px 40px rgba(0,0,0,.6), 0 0 20px rgba(239,68,68,.2);
    }
    .toast.warn{ 
      border-color: rgba(245,158,11,.4); 
      background: linear-gradient(135deg, #78350f 0%, #451a03 100%);
      box-shadow: 0 20px 40px rgba(0,0,0,.6), 0 0 20px rgba(245,158,11,.2);
    }

    /* Custom modal overlay and dialog styling */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      z-index: 9998;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.show {
      display: flex;
      opacity: 1;
    }
    .modal-dialog {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 16px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,.8);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.show .modal-dialog {
      transform: scale(1) translateY(0);
    }

    /* Enhanced button animations and hover effects */
    .btn-primary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: 1px solid rgba(16,185,129,.3);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      box-shadow: 0 8px 25px rgba(16,185,129,.3);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,.04) 100%);
      border: 1px solid rgba(255,255,255,.15);
      transition: all 0.2s ease;
    }
    .btn-secondary:hover {
      background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, rgba(255,255,255,.08) 100%);
      transform: translateY(-1px);
    }

    /* Enhanced form inputs with better focus states */
    .form-input {
      background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
      border: 1px solid rgba(255,255,255,.12);
      transition: all 0.2s ease;
    }
    .form-input:focus {
      border-color: rgba(16,185,129,.5);
      box-shadow: 0 0 0 3px rgba(16,185,129,.15), 0 0 20px rgba(16,185,129,.1);
      background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,.05) 100%);
    }

    /* Loading spinner animation */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin {
      animation: spin 1s linear infinite;
    }

    /* Pulse animation for loading states */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>
<body class="min-h-dvh bg-slate-900 text-slate-100">
  <!-- BG -->
  <div class="pointer-events-none fixed inset-0 -z-10">
    <div class="absolute inset-0 bg-[radial-gradient(90%_70%_at_10%_-10%,rgba(34,211,238,.10),rgba(59,130,246,.10),rgba(0,0,0,0))]"></div>
  </div>

  <header class="sticky top-0 z-10 bg-slate-900/70 backdrop-blur border-b border-white/10">
    <div class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="./admin-dashboard.html"
           class="inline-flex items-center gap-2 rounded-lg border border-white/10 bg-white/5 px-3 py-1.5 text-sm hover:bg-white/10">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back
        </a>
        <h1 class="text-lg font-semibold tracking-tight">Admin <span class="text-brand-500">Coin Rate</span> & Purchases</h1>
      </div>
      <a id="logoutBtn" class="text-sm text-slate-300 hover:text-white cursor-pointer">Log out</a>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8 space-y-8">
    <!-- Enhanced Coin Rate Card with better visual hierarchy -->
    <section class="glass p-6 md:p-8 hover:border-white/15 transition-all duration-300">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-xl md:text-2xl font-bold tracking-tight bg-gradient-to-r from-brand-500 to-emerald-300 bg-clip-text text-transparent">Coin Rate Management</h2>
          <p class="text-slate-400 mt-2 leading-relaxed">Set the exchange rate for <strong class="text-emerald-400">1 copupcoin</strong>. Currency defaults to NGN.</p>
        </div>
        <span id="lastUpdated" class="badge text-slate-300 bg-gradient-to-r from-slate-700 to-slate-600">—</span>
      </div>

      <form id="rateForm" class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2" for="currency">Currency</label>
          <select id="currency" class="form-input w-full rounded-xl px-4 py-3 outline-none">
            <option value="NGN">NGN - Nigerian Naira</option>
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2" for="unitPrice">Unit Price (per 1 coin)</label>
          <input id="unitPrice" type="number" step="0.01" min="0"
                 class="form-input w-full rounded-xl px-4 py-3 outline-none"
                 placeholder="e.g. 50.00" />
        </div>
        <div class="flex items-end gap-3">
          <button id="saveRateBtn" type="submit"
                  class="btn-primary inline-flex items-center gap-2 rounded-xl px-6 py-3 font-semibold text-slate-950 disabled:opacity-60 disabled:cursor-not-allowed">
            <svg id="saveRateSpinner" class="hidden h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-opacity=".25" stroke-width="4"></circle>
              <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="4"></path>
            </svg>
            <span>Save Rate</span>
          </button>
          <button id="resetRateBtn" type="button"
                  class="btn-secondary inline-flex items-center gap-2 rounded-xl px-6 py-3 font-medium text-slate-100">
            Reset
          </button>
        </div>
      </form>

      <!-- Enhanced preview section with better styling -->
      <div class="mt-6 p-4 rounded-xl bg-gradient-to-r from-slate-800/50 to-slate-700/30 border border-slate-600/30">
        <div class="text-sm font-medium text-slate-300 mb-1">Rate Preview</div>
        <div class="text-slate-400" id="previewLine">—</div>
      </div>

      <div id="rateOk"  class="hidden mt-4 rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-emerald-200"></div>
      <div id="rateErr" class="hidden mt-4 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-red-200"></div>
    </section>

    <!-- Enhanced Purchases Card with better visual design -->
    <section class="glass p-6 md:p-8 hover:border-white/15 transition-all duration-300">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-xl md:text-2xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">Coin Purchase Management</h2>
          <p class="text-slate-400 mt-2 leading-relaxed">Review and manage user coin purchase requests.</p>
        </div>
        <div class="flex items-center gap-2">
          <button id="refreshBtn" class="btn-secondary inline-flex items-center gap-2 rounded-lg px-4 py-2 text-sm">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4v6h6M20 20v-6h-6M5 19A9 9 0 0 1 19 5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Refresh
          </button>
        </div>
      </div>

      <!-- Enhanced Filters section -->
      <div class="mt-8 grid grid-cols-1 md:grid-cols-[200px_200px_auto] gap-4">
        <select id="fStatus" class="form-input w-full rounded-xl px-4 py-3 outline-none">
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
        <input id="fUserId" type="number" min="1" placeholder="Filter by User ID"
               class="form-input w-full rounded-xl px-4 py-3 outline-none" />
        <div class="flex items-center gap-3">
          <button id="applyFiltersBtn" class="btn-primary rounded-xl px-6 py-3 font-semibold text-slate-950">Apply Filters</button>
          <button id="clearFiltersBtn" class="btn-secondary rounded-xl px-6 py-3">Clear</button>
        </div>
      </div>

      <!-- Table -->
      <div class="mt-6 overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="text-left text-slate-300">
            <tr class="border-b border-white/10">
              <th class="py-2 pr-3">#</th>
              <th class="py-2 pr-3">User</th>
              <th class="py-2 pr-3">Coins</th>
              <th class="py-2 pr-3">Unit</th>
              <th class="py-2 pr-3">Total</th>
              <th class="py-2 pr-3">Status</th>
              <th class="py-2 pr-3">Proof</th>
              <th class="py-2 pr-3">User Note</th>
              <th class="py-2 pr-3">Admin Note</th>
              <th class="py-2 pr-3">When</th>
              <th class="py-2 pr-3">Actions</th>
            </tr>
          </thead>
          <tbody id="purchasesTbody" class="align-top"></tbody>
        </table>
      </div>

      <div id="listErr" class="hidden mt-4 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-red-200"></div>
    </section>
  </main>

  <!-- Enhanced toast notification -->
  <div id="toast" class="toast"></div>

  <!-- Custom modal for user input -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-dialog">
      <div class="mb-4">
        <h3 id="modalTitle" class="text-lg font-semibold text-slate-100"></h3>
        <p id="modalMessage" class="text-slate-400 mt-1"></p>
      </div>
      <div class="mb-6">
        <textarea id="modalInput" 
                  class="form-input w-full rounded-xl px-4 py-3 outline-none resize-none" 
                  rows="3" 
                  placeholder="Enter your note here..."></textarea>
      </div>
      <div class="flex justify-end gap-3">
        <button id="modalCancel" class="btn-secondary px-6 py-2 rounded-xl">Cancel</button>
        <button id="modalConfirm" class="btn-primary px-6 py-2 rounded-xl text-slate-950 font-semibold">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // ====== CONFIG ======
    const API_BASE = "https://api.copup.copupbid.com/api/admin";
    const BACKEND_ORIGIN = "https://api.copup.copupbid.com";
    const LOGIN_URL = "../auth/login.html";

    // ====== STATE ======
    let rateInitial = { currency: "NGN", unit_price: 0, updated_at: null };

    // ====== HELPERS ======
    const $ = (id) => document.getElementById(id);
    const show = (el) => el.classList.remove("hidden");
    const hide = (el) => el.classList.add("hidden");
    const toast = (msg, kind='ok', ms=4000) => {
      const t = $("toast");
      t.textContent = msg;
      t.className = 'toast ' + (kind === 'err' ? 'err' : kind === 'warn' ? 'warn' : 'ok');
      t.classList.add('show');
      setTimeout(() => {
        t.classList.remove('show');
        setTimeout(() => { t.style.display = 'none'; }, 400);
      }, ms);
    };
    const absUrl = (p) => {
      if (!p) return "";
      if (/^https?:\/\//i.test(p)) return p;
      if (p.startsWith("/")) return BACKEND_ORIGIN + p;
      return BACKEND_ORIGIN + "/" + p.replace(/^\.\//, "");
    };
    const fmtDate = (d) => d ? new Date(d).toLocaleString() : "—";
    function badge(html, colorClass){
      return `<span class="badge ${colorClass}">${html}</span>`;
    }
    function statusBadge(st){
      const s = String(st || '').toLowerCase();
      if (s === 'approved') return badge('approved','border-emerald-500/30 text-emerald-200');
      if (s === 'rejected') return badge('rejected','border-red-500/30 text-red-200');
      return badge('pending','border-amber-500/30 text-amber-200');
    }

    // ====== AUTH / AXIOS SETUP ======
    function ensureAuth() {
      const tok = localStorage.getItem("authToken");
      if (!tok) { window.location.href = LOGIN_URL; return null; }
      axios.defaults.baseURL = API_BASE;
      axios.defaults.headers.common["Authorization"] = "Bearer " + tok.replace(/^"(.+)"$/, "$1");
      axios.defaults.headers.common["Content-Type"] = "application/json";
      return tok;
    }
    axios.interceptors.response.use(
      (res) => res,
      (err) => {
        const s = err?.response?.status;
        if (s === 401 || s === 403) {
          localStorage.removeItem("authToken");
          window.location.href = LOGIN_URL;
          return;
        }
        return Promise.reject(err);
      }
    );

    // ====== COIN RATE ======
    function startSavingRate(){ $("saveRateBtn").disabled = true; $("saveRateSpinner").classList.remove("hidden"); $("saveRateBtn").classList.add("ring-soft"); }
    function stopSavingRate(){ $("saveRateBtn").disabled = false; $("saveRateSpinner").classList.add("hidden"); $("saveRateBtn").classList.remove("ring-soft"); }

    function renderRatePreview(){
      const cur = $("currency").value || "NGN";
      const unit = Number($("unitPrice").value) || 0;
      if (unit > 0) {
        const ten   = (10 * unit).toLocaleString(undefined, { style:'currency', currency: cur });
        const hund  = (100 * unit).toLocaleString(undefined, { style:'currency', currency: cur });
        $("previewLine").textContent = `Examples: 10 coins ≈ ${ten} • 100 coins ≈ ${hund}`;
      } else {
        $("previewLine").textContent = "—";
      }
    }

    async function loadRate(){
      hide($("rateOk")); hide($("rateErr"));
      try {
        const { data } = await axios.get("/coin-rate", { params: { ts: Date.now() } });
        const unit = Number(data?.unit_price || 0);
        const cur  = (data?.currency || "NGN").toUpperCase();
        const upd  = data?.updated_at;

        $("currency").value = cur;
        $("unitPrice").value = unit > 0 ? unit : "";
        $("lastUpdated").textContent = upd ? ("updated " + fmtDate(upd)) : "—";

        rateInitial = { currency: cur, unit_price: unit, updated_at: upd };
        renderRatePreview();
      } catch (err) {
        console.error("loadRate error:", err);
        $("rateErr").textContent = err?.response?.data?.message || "Error fetching coin rate";
        show($("rateErr"));
      }
    }

    async function saveRate(e){
      e.preventDefault();
      hide($("rateOk")); hide($("rateErr"));

      const currency = ($("currency").value || "NGN").toUpperCase();
      const unit = Number($("unitPrice").value);

      if (!(unit > 0)) {
        $("rateErr").textContent = "Unit price must be a positive number.";
        show($("rateErr"));
        return;
      }

      try {
        startSavingRate();
        const { data } = await axios.put("/coin-rate", { unit_price: unit, currency });
        $("rateOk").textContent = data?.message || "Coin rate updated.";
        show($("rateOk"));
        await loadRate();
        toast("Coin rate saved.", "ok");
      } catch (err) {
        console.error("saveRate error:", err);
        $("rateErr").textContent = err?.response?.data?.message || "Error updating coin rate";
        show($("rateErr"));
        toast("Failed to save coin rate", "err");
      } finally {
        stopSavingRate();
      }
    }

    function resetRate(){
      hide($("rateOk")); hide($("rateErr"));
      $("currency").value = rateInitial.currency || "NGN";
      $("unitPrice").value = rateInitial.unit_price || "";
      renderRatePreview();
    }

    // ====== PURCHASES LIST ======
    async function loadPurchases(){
      hide($("listErr"));
      const status = $("fStatus").value || "";
      const userId = $("fUserId").value ? Number($("fUserId").value) : "";
      const params = { ts: Date.now() };
      if (status) params.status = status;
      if (userId) params.userId = userId;

      try {
        const { data } = await axios.get("/coin-purchases", { params });
        renderPurchases(data || []);
      } catch (err) {
        console.error("load purchases error:", err);
        $("listErr").textContent = err?.response?.data?.message || "Error fetching coin purchases";
        show($("listErr"));
      }
    }

    function renderPurchases(rows){
      const tb = $("purchasesTbody");
      tb.innerHTML = "";
      if (!rows.length) {
        tb.innerHTML = `<tr><td colspan="11" class="py-6 text-center text-slate-400">No purchases found.</td></tr>`;
        return;
      }

      for (const r of rows) {
        const proof = r.proof_image ? `<a class="text-accent-500 hover:underline" href="${absUrl(r.proof_image)}" target="_blank" rel="noopener">Open</a>` : "—";
        const user = `${r.username || '—'}<br><span class="text-slate-400">${r.email || ''}</span>`;
        const coins = Number(r.coins || 0).toLocaleString();
        const unit  = Number(r.unit_price || 0);
        const total = Number(r.total_price || (unit * (r.coins || 0)));
        const cur   = (r.currency || '').toUpperCase() || ''; // if you store it; otherwise leave blank

        const unitTxt  = unit ? unit.toLocaleString() : "—";
        const totalTxt = total ? total.toLocaleString() : "—";

        const row = document.createElement("tr");
        row.className = "border-b border-white/10";
        row.innerHTML = `
          <td class="py-2 pr-3">${r.id}</td>
          <td class="py-2 pr-3">${user}</td>
          <td class="py-2 pr-3">${coins}</td>
          <td class="py-2 pr-3">${unitTxt}</td>
          <td class="py-2 pr-3">${totalTxt}</td>
          <td class="py-2 pr-3">${statusBadge(r.status)}</td>
          <td class="py-2 pr-3">${proof}</td>
          <td class="py-2 pr-3 max-w-[220px]"><div class="line-clamp-3">${r.user_note || '—'}</div></td>
          <td class="py-2 pr-3 max-w-[220px]"><div class="line-clamp-3">${r.admin_note || '—'}</div></td>
          <td class="py-2 pr-3">
            <div class="text-slate-300">${fmtDate(r.created_at)}</div>
            <div class="text-slate-400 text-xs">upd: ${fmtDate(r.updated_at)}</div>
          </td>
          <td class="py-2 pr-3">
            <div class="flex flex-wrap gap-2">
              <button data-act="approve" data-id="${r.id}" class="px-2.5 py-1 rounded-lg border border-emerald-500/30 text-emerald-200 hover:bg-emerald-500/10">Approve</button>
              <button data-act="reject"  data-id="${r.id}" class="px-2.5 py-1 rounded-lg border border-red-500/30 text-red-200 hover:bg-red-500/10">Reject</button>
            </div>
          </td>
        `;
        tb.appendChild(row);
      }

      // bind actions
      tb.querySelectorAll("button[data-act]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = Number(btn.getAttribute("data-id"));
          const act = btn.getAttribute("data-act");
          if (!Number.isInteger(id) || id <= 0) return;

          try {
            let note = "";
            if (act === "approve") {
              note = await showModal(
                "Approve Purchase", 
                `Approve purchase #${id}? You can add an optional admin note.`,
                "Optional admin note for approval..."
              );
              if (note === null) return; // User cancelled
              await updatePurchase(id, "approve", note);
            } else {
              note = await showModal(
                "Reject Purchase", 
                `Reject purchase #${id}? Please provide a reason.`,
                "Reason for rejection..."
              );
              if (note === null) return; // User cancelled
              await updatePurchase(id, "reject", note);
            }
            await loadPurchases();
            toast(`Purchase #${id} ${act}ed successfully.`, "ok");
          } catch (err) {
            console.error("update purchase error:", err);
            toast(err?.response?.data?.message || "Error updating purchase", "err");
          }
        });
      });
    }

    async function updatePurchase(id, action, admin_note){
      await axios.patch(`/coin-purchases/${id}`, { action, admin_note });
    }

    // ====== LOGOUT ======
    function logout(){
      localStorage.removeItem("authToken");
      window.location.href = LOGIN_URL;
    }

    // ====== INIT ======
    window.addEventListener("DOMContentLoaded", async () => {
      if (!ensureAuth()) return;

      // Rate form
      $("rateForm").addEventListener("submit", saveRate);
      $("resetRateBtn").addEventListener("click", resetRate);
      $("currency").addEventListener("change", renderRatePreview);
      $("unitPrice").addEventListener("input", renderRatePreview);

      // Purchases filters
      $("applyFiltersBtn").addEventListener("click", loadPurchases);
      $("clearFiltersBtn").addEventListener("click", () => {
        $("fStatus").value = "";
        $("fUserId").value = "";
        loadPurchases();
      });
      $("refreshBtn").addEventListener("click", loadPurchases);

      $("logoutBtn").addEventListener("click", logout);

      // Load data
      await loadRate();
      await loadPurchases();
    });

    function showModal(title, message, placeholder = "") {
      return new Promise((resolve) => {
        const overlay = $("modalOverlay");
        const titleEl = $("modalTitle");
        const messageEl = $("modalMessage");
        const input = $("modalInput");
        const confirmBtn = $("modalConfirm");
        const cancelBtn = $("modalCancel");

        titleEl.textContent = title;
        messageEl.textContent = message;
        input.placeholder = placeholder;
        input.value = "";

        overlay.classList.add('show');
        input.focus();

        const cleanup = () => {
          overlay.classList.remove('show');
          confirmBtn.removeEventListener('click', onConfirm);
          cancelBtn.removeEventListener('click', onCancel);
          overlay.removeEventListener('click', onOverlayClick);
        };

        const onConfirm = () => {
          cleanup();
          resolve(input.value.trim());
        };

        const onCancel = () => {
          cleanup();
          resolve(null);
        };

        const onOverlayClick = (e) => {
          if (e.target === overlay) {
            onCancel();
          }
        };

        confirmBtn.addEventListener('click', onConfirm);
        cancelBtn.addEventListener('click', onCancel);
        overlay.addEventListener('click', onOverlayClick);
      });
    }
  </script>
</body>
