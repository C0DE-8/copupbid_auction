<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heist Management - CopUpBid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        
        /* Enhanced toaster system with better animations and styling */
        .custom-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 16px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateX(400px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 320px;
            max-width: 450px;
            font-size: 14px;
            line-height: 1.5;
            animation: slideInBounce 0.6s ease-out forwards;
        }
        
        @keyframes slideInBounce {
            0% {
                transform: translateX(400px) scale(0.9);
                opacity: 0;
            }
            60% {
                transform: translateX(-10px) scale(1.02);
                opacity: 1;
            }
            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }
        
        @keyframes slideOutBounce {
            0% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateX(400px) scale(0.9);
                opacity: 0;
            }
        }
        
        .custom-alert.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }
        
        .custom-alert.hide {
            animation: slideOutBounce 0.4s ease-in forwards;
        }
        
        .custom-alert.success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.95), rgba(5, 150, 105, 0.95));
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.3);
        }
        .custom-alert.error {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.95), rgba(220, 38, 38, 0.95));
            border-color: rgba(239, 68, 68, 0.4);
            box-shadow: 0 15px 35px rgba(239, 68, 68, 0.3);
        }
        .custom-alert.warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.95), rgba(217, 119, 6, 0.95));
            border-color: rgba(245, 158, 11, 0.4);
            box-shadow: 0 15px 35px rgba(245, 158, 11, 0.3);
        }
        .custom-alert.info {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.95), rgba(37, 99, 235, 0.95));
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.3);
        }
        
        /* Enhanced loading spinner with better animation */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top: 3px solid #10b981;
            border-right: 3px solid #10b981;
            width: 24px;
            height: 24px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Enhanced preloader for table content */
        .table-preloader {
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 20px;
            margin: 4px 0;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .admin-card {
            transition: all 0.3s ease;
        }
        .admin-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.2);
        }
        
        .enhanced-select {
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.9), rgba(17, 24, 39, 0.9));
            border: 2px solid rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
            position: relative;
        }
        .enhanced-select:focus {
            border-color: rgba(16, 185, 129, 0.6);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
            outline: none;
        }
        .enhanced-select:hover {
            border-color: rgba(16, 185, 129, 0.5);
        }
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #10b981;
            pointer-events: none;
            font-size: 12px;
        }
    </style>
</head>

    <script>
        const API_BASE = 'https://api.copup.copupbid.com/api';
        const ADMIN_API_BASE = 'https://api.copup.copupbid.com/api/admin';
        let authToken = localStorage.getItem('authToken');
        let currentPage = 1;
        let searchTimeout;
        let currentHeistId = null;

        function setupAxiosHeaders() {
            axios.defaults.headers.common['Authorization'] = `Bearer ${authToken}`;
            axios.defaults.headers.common['Content-Type'] = 'application/json';
        }

        function showAlert(message, type = 'success', duration = 5000) {
            // Remove existing alerts with animation
            const existingAlerts = document.querySelectorAll('.custom-alert');
            existingAlerts.forEach((alert, index) => {
                setTimeout(() => {
                    alert.classList.add('hide');
                    setTimeout(() => alert.remove(), 400);
                }, index * 100);
            });
            
            const alert = document.createElement('div');
            alert.className = `custom-alert ${type}`;
            
            // Enhanced icons with better styling
            const icons = {
                success: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>',
                error: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>',

                `).join('');
                
                currentPage = page;
                const status = document.getElementById('statusFilter').value;
                const category = document.getElementById('categoryFilter').value;
                const search = document.getElementById('searchInput').value;

                let url = `${ADMIN_API_BASE}/heists`;
                const params = new URLSearchParams();
                if (status) params.append('status', status);
                if (category) params.append('category', category);
                if (search) params.append('search', search);
                params.append('page', page);
                params.append('limit', 10);
                if (params.toString()) url += '?' + params.toString();

                const response = await axios.get(url);
                
                let heists, total, currentPageNum, limit;
                
                // Handle different possible response structures
                if (response.data && typeof response.data === 'object') {
                    if (Array.isArray(response.data)) {
                        heists = response.data;
                        total = heists.length;
                        currentPageNum = page;
                        limit = 10;
                    } else if (response.data.data && Array.isArray(response.data.data)) {
                        heists = response.data.data;
                        total = response.data.total || heists.length;
                        currentPageNum = response.data.page || page;
                        limit = response.data.limit || 10;
                    } else {
                        heists = response.data.heists || [];
                        total = response.data.total || heists.length;
                        currentPageNum = response.data.page || page;
                        limit = response.data.limit || 10;
                    }
                } else {
                    heists = [];
                    total = 0;
                    currentPageNum = page;
                    limit = 10;
                }

                if (!Array.isArray(heists)) {
                    heists = [];
                }

                // Update both list and grid views
                updateListView(heists);
                updateGridView(heists);

                createPagination('pagination', currentPageNum, Math.ceil(total / limit), loadHeists);
            } catch (error) {
                console.error('Error loading heists:', error);
                document.getElementById('heistsTableBody').innerHTML = '<tr><td colspan="10" class="px-6 py-12 text-center text-red-400">Error loading heists</td></tr>';

                showAlert('Error loading heists: ' + (error.response?.data?.message || error.message), 'error');

                document.getElementById('heistsLoading').classList.add('hidden');
            }
        }

        document.getElementById('heistForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.innerHTML = '<div class="flex items-center space-x-2"><div class="spinner"></div><span>Saving...</span></div>';
                submitBtn.disabled = true;
                
                const formData = new FormData(e.target);

                let response;
                if (currentHeistId) {
                    // Update existing heist
                    response = await axios.put(`${ADMIN_API_BASE}/heists/${currentHeistId}`, formData);
                } else {
                    // Create new heist
                    response = await axios.post(`${ADMIN_API_BASE}/heists`, formData);
                }

                showAlert(response.data.message || 'Heist saved successfully!', 'success');
                closeHeistModal();
                loadHeists();
            } catch (error) {
                console.error('Error saving heist:', error);
                showAlert(error.response?.data?.message || 'Error saving heist', 'error');
            } finally {
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.textContent = 'Save Heist';
                submitBtn.disabled = false;
            }
        });

        async function deleteHeist(id) {
            // Enhanced confirmation dialog
            const confirmed = confirm(`⚠️ DELETE HEIST CONFIRMATION\n\nAre you absolutely sure you want to delete this heist?\n\n• This action cannot be undone\n• Only pending heists can be deleted\n• All associated data will be permanently removed\n\nClick OK to proceed with deletion.`);
            
            if (!confirmed) return;

            try {
                showAlert('🗑️ Deleting heist... Please wait', 'warning', 3000);
                
                const response = await axios.delete(`${ADMIN_API_BASE}/heists/${id}`);
                showAlert('✅ Heist deleted successfully!', 'success');
                loadHeists(); // Reload the current page
            } catch (error) {
                console.error('Error deleting heist:', error);
                
                // Enhanced error handling based on backend response
                let errorMessage = 'Failed to delete heist';
                if (error.response?.status === 400) {
                    errorMessage = error.response.data.message || 'Heist cannot be deleted (may have already started or not found)';
                } else if (error.response?.status === 404) {
                    errorMessage = 'Heist not found';
                } else if (error.response?.status === 403) {
                    errorMessage = 'Access denied - Admin privileges required';
                } else if (error.response?.data?.message) {
                    errorMessage = error.response.data.message;
                }
                
                showAlert(`❌ ${errorMessage}`, 'error', 6000);
            }
        }

                let url = `${ADMIN_API_BASE}/heist-orders`;
                if (status) url += `?status=${status}`;

                const response = await axios.get(url);
                const orders = response.data.data || response.data;

                const tbody = document.getElementById('ordersTableBody');
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-400">No orders found</td></tr>';
                } else {
                    tbody.innerHTML = orders.map(order => `
                        <tr class="border-b border-white/10 hover:bg-white/5 transition-colors">
                            <td class="px-6 py-4 font-medium">${order.id}</td>
                            <td class="px-6 py-4">${order.username}</td>
                            <td class="px-6 py-4">${order.itemCount || order.item_count || 0}</td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 rounded-full text-xs font-medium ${getOrderStatusColor(order.status)}">
                                    ${order.status.replace('_', ' ').toUpperCase()}
                                </span>
                            </td>
                            <td class="px-6 py-4">${order.trackingNumber || order.tracking_number || 'N/A'}</td>
                            <td class="px-6 py-4">${new Date(order.createdAt || order.created_at).toLocaleDateString()}</td>
                            <td class="px-6 py-4">
                                <button onclick="updateOrderStatus(${order.id})" class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded-lg text-xs font-medium transition-colors">
                                    Update
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading heist orders:', error);
                showAlert('Error loading heist orders', 'error');
                document.getElementById('ordersTableBody').innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-red-400">Error loading orders</td></tr>';
            }
        }

        // Get order status color
        function getOrderStatusColor(status) {
            const colors = {
                'processing': 'bg-yellow-500/20 text-yellow-400',
                'packed': 'bg-blue-500/20 text-blue-400',
                'shipped': 'bg-green-500/20 text-green-400',
                'in_transit': 'bg-purple-500/20 text-purple-400',
                'delivered': 'bg-emerald-500/20 text-emerald-400',
                'cancelled': 'bg-red-500/20 text-red-400'
            };
            return colors[status] || 'bg-gray-500/20 text-gray-400';
        }

        // Update order status
        async function updateOrderStatus(orderId) {
            const statusOptions = [
                { value: 'processing', label: '🔄 Processing' },
                { value: 'packed', label: '📦 Packed' },
                { value: 'shipped', label: '🚚 Shipped' },
                { value: 'in_transit', label: '🛣️ In Transit' },
                { value: 'delivered', label: '✅ Delivered' },
                { value: 'cancelled', label: '❌ Cancelled' }
            ];

            const statusList = statusOptions.map(opt => `${opt.value} - ${opt.label}`).join('\n');
            const newStatus = prompt(`Select new status:\n\n${statusList}\n\nEnter status value:`);
            
            if (!newStatus) return;

            const validStatuses = ['processing', 'packed', 'shipped', 'in_transit', 'delivered', 'cancelled'];
            if (!validStatuses.includes(newStatus.toLowerCase())) {
                showAlert('Invalid status. Please enter one of: processing, packed, shipped, in_transit, delivered, cancelled', 'error');
                return;
            }

            let trackingNumber = null;
            if (newStatus.toLowerCase() === 'shipped' || newStatus.toLowerCase() === 'in_transit') {
                trackingNumber = prompt('Enter tracking number (optional for better customer experience):');
            }

            try {
                showAlert('Updating order status...', 'info', 2000);
                
                const updateData = { order_status: newStatus.toLowerCase() };
                if (trackingNumber && trackingNumber.trim()) {
                    updateData.tracking_number = trackingNumber.trim();
                }

                const response = await axios.patch(`${ADMIN_API_BASE}/heist-orders/${orderId}`, updateData);
                showAlert(response.data.message || `Order status updated to ${newStatus.toUpperCase()} successfully!`, 'success');
                loadHeistOrders();
            } catch (error) {
                console.error('Error updating order status:', error);
                showAlert(error.response?.data?.message || 'Error updating order status', 'error');
            }
        }

        function createPagination(containerId, currentPage, totalPages, loadFunction) {
            const container = document.getElementById(containerId);
            if (!container || totalPages <= 1) return;
            
            let pagination = '';
            
            // Previous button
            if (currentPage > 1) {
                pagination += `<button onclick="${loadFunction.name}(${currentPage - 1})" class="glass-effect px-4 py-2 rounded-lg hover:bg-white/20 transition-colors">Previous</button>`;
            }
            
            // Page numbers
            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                pagination += `<button onclick="${loadFunction.name}(${i})" class="px-4 py-2 rounded-lg transition-colors ${i === currentPage ? 'bg-emerald-600 text-white' : 'glass-effect hover:bg-white/20'}">${i}</button>`;
            }
            
            // Next button
            if (currentPage < totalPages) {
                pagination += `<button onclick="${loadFunction.name}(${currentPage + 1})" class="glass-effect px-4 py-2 rounded-lg hover:bg-white/20 transition-colors">Next</button>`;
            }
            
            container.innerHTML = pagination;
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Search debounce
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadHeists();
            }, 500);
        }

        // Logout
        function logout() {
            localStorage.removeItem('authToken');
            window.location.href = '../auth/login.html';
        }

        // Keyboard support for demo user modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('demoUserModal')) {
                const heistId = document.querySelector('[onclick*="submitDemoUser"]')?.onclick.toString().match(/\d+/)?.[0];
                if (heistId) {
                    submitDemoUser(parseInt(heistId));
                }
            }
            if (e.key === 'Escape' && document.getElementById('demoUserModal')) {
                closeDemoUserModal();
            }
        });
    </script>
</body>
</html>
