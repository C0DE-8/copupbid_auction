<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CopUpBid</title>
    <link rel="icon" href="../assets/images/copupcoin.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        secondary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="bg-gray-800 rounded-lg shadow-xl p-8">
         
            <div class="text-center mb-8">
                <img src="../assets/images/copupcoin.png" alt="CopUpCoin" class="w-16 h-16 mx-auto mb-4">
                <h1 class="text-2xl font-bold text-primary">Join CopUpBid</h1>
                <p class="text-gray-400 mt-2">Create your account to get started</p>
            </div>

            <!-- STEP 1: EMAIL + NAME -->
            <form id="otpForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-2">
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400"
                        placeholder="Enter your email address"
                    >
                </div>

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-300 mb-2">
                        Full Name (Optional)
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name"
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400"
                        placeholder="Enter your full name"
                    >
                </div>

                <button 
                    type="submit" 
                    id="otpBtn"
                    class="w-full bg-gradient-to-r from-primary to-secondary hover:from-green-600 hover:to-blue-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 transform hover:scale-105"
                >
                    Send Verification Code
                </button>

                <!-- Small legal note on step 1 -->
                <p class="text-xs text-gray-500 text-center">
                    By continuing, you agree to CopUpBid’s 
                    <a href="../terms.html" class="text-primary hover:text-green-400 underline underline-offset-2">Terms of Use</a> 
                    and 
                    <a href="../privacy.html" class="text-primary hover:text-green-400 underline underline-offset-2">Privacy Policy</a>.
                </p>
            </form>

            <!-- STEP 2: OTP + FULL REGISTRATION -->
            <form id="registerForm" class="space-y-6 hidden">
                <div class="bg-green-900/20 border border-green-500 text-green-200 px-4 py-3 rounded-lg mb-4">
                    <p class="text-sm">Verification code sent! Check your email and complete registration below.</p>
                </div>

                <div>
                    <label for="otp" class="block text-sm font-medium text-gray-300 mb-2">
                        Verification Code
                    </label>
                    <input 
                        type="text" 
                        id="otp" 
                        name="otp" 
                        required
                        maxlength="6"
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400 text-center text-lg tracking-widest"
                        placeholder="000000"
                    >
                </div>

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">
                        Username
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400"
                        placeholder="Choose a username"
                    >
                </div>

                <div>
                    <label for="fullName" class="block text-sm font-medium text-gray-300 mb-2">
                        Full Name
                    </label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName"
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400"
                        placeholder="Enter your full name"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                        Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400"
                        placeholder="Create a strong password"
                    >
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-300 mb-2">
                        Confirm Password
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        required
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400"
                        placeholder="Confirm your password"
                    >
                </div>

                <div>
                    <label for="referralCode" class="block text-sm font-medium text-gray-300 mb-2">
                        Referral Code (Optional)
                    </label>
                    <input 
                        type="text" 
                        id="referralCode" 
                        name="referralCode"
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400"
                        placeholder="Enter referral code if you have one"
                    >
                </div>

                <!-- AGREEMENT SECTION -->
                <div class="flex items-start gap-3 text-sm">
                    <input 
                        id="agreeTerms" 
                        name="agreeTerms" 
                        type="checkbox" 
                        required
                        class="mt-1 h-4 w-4 rounded border-gray-500 bg-gray-700 text-primary focus:ring-primary focus:ring-offset-0"
                    >
                    <label for="agreeTerms" class="text-gray-300">
                        I have read and agree to CopUpBid’s
                        <a href="../terms.html" target="_blank" class="text-primary hover:text-green-400 underline underline-offset-2">
                            Terms of Use
                        </a>
                        and
                        <a href="../privacy.html" target="_blank" class="text-primary hover:text-green-400 underline underline-offset-2">
                            Privacy Policy
                        </a>.
                    </label>
                </div>

                <button 
                    type="submit" 
                    id="registerBtn"
                    class="w-full bg-gradient-to-r from-primary to-secondary hover:from-green-600 hover:to-blue-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 transform hover:scale-105"
                >
                    Create Account
                </button>

                <button 
                    type="button" 
                    id="backBtn"
                    class="w-full bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-300"
                >
                    ← Back to Email Verification
                </button>
            </form>

            <!-- ERROR / SUCCESS -->
            <div id="errorMessage" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-lg mt-4">
            </div>

            <div id="successMessage" class="hidden bg-green-900/50 border border-green-500 text-green-200 px-4 py-3 rounded-lg mt-4">
            </div>

            <!-- FOOTER LINKS -->
            <div class="mt-6 text-center space-y-2">
                <p class="text-gray-400">
                    Already have an account? 
                    <a href="login.html" class="text-primary hover:text-green-400 font-medium">Sign in here</a>
                </p>
                <a href="../index.html" class="text-gray-400 hover:text-white text-sm">← Back to Home</a>
                <p class="text-xs text-gray-500 pt-1">
                    <a href="../terms.html" class="hover:text-primary underline underline-offset-2">Terms of Use</a> ·
                    <a href="../privacy.html" class="hover:text-primary underline underline-offset-2">Privacy Policy</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.copup.copupbid.com/api/auth';
        let userEmail = '';
        let userName = '';
        
        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const authToken = localStorage.getItem('authToken');
            if (authToken) {
                window.location.href = '../pages/dashboard.html';
            }
        });

        // Step 1: Send OTP
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otpBtn = document.getElementById('otpBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Hide previous messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            
            // Show loading state
            otpBtn.textContent = 'Sending Code...';
            otpBtn.disabled = true;
            
            const formData = new FormData(e.target);
            userEmail = formData.get('email');
            userName = formData.get('name') || '';
            
            const otpData = {
                email: userEmail,
                name: userName
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/send-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(otpData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Show registration form
                    document.getElementById('otpForm').classList.add('hidden');
                    document.getElementById('registerForm').classList.remove('hidden');
                    
                    // Pre-fill full name if provided
                    if (userName) {
                        document.getElementById('fullName').value = userName;
                    }
                    
                } else {
                    errorMessage.textContent = data.message || 'Failed to send verification code. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
                
            } catch (error) {
                console.error('OTP error:', error);
                errorMessage.textContent = 'Network error. Please check your connection and try again.';
                errorMessage.classList.remove('hidden');
            } finally {
                otpBtn.textContent = 'Send Verification Code';
                otpBtn.disabled = false;
            }
        });

        // Step 2: Register with OTP
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const registerBtn = document.getElementById('registerBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Hide previous messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            // Ensure terms accepted
            const agreeCheckbox = document.getElementById('agreeTerms');
            if (!agreeCheckbox.checked) {
                errorMessage.textContent = 'You must agree to the Terms of Use and Privacy Policy to create an account.';
                errorMessage.classList.remove('hidden');
                return;
            }
            
            const formData = new FormData(e.target);
            const password = formData.get('password');
            const confirmPassword = formData.get('confirmPassword');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match.';
                errorMessage.classList.remove('hidden');
                return;
            }
            
            // Show loading state
            registerBtn.textContent = 'Creating Account...';
            registerBtn.disabled = true;
            
            const registerData = {
                username: formData.get('username'),
                email: userEmail,
                full_name: formData.get('fullName') || null,
                password: password,
                otp: formData.get('otp'),
                referralCode: formData.get('referralCode') || null
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(registerData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successMessage.textContent = 'Account created successfully! Redirecting to login...';
                    successMessage.classList.remove('hidden');
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                    
                } else {
                    errorMessage.textContent = data.message || 'Registration failed. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
                
            } catch (error) {
                console.error('Registration error:', error);
                errorMessage.textContent = 'Network error. Please check your connection and try again.';
                errorMessage.classList.remove('hidden');
            } finally {
                registerBtn.textContent = 'Create Account';
                registerBtn.disabled = false;
            }
        });

        // Back button functionality
        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('otpForm').classList.remove('hidden');
            
            // Clear any error messages
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        });

        // Auto-format OTP input
        document.getElementById('otp').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
        });
    </script>
</body>
</html>
