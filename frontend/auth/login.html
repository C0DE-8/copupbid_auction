<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CopUpBid</title>
    <link rel="icon" href="../assets/images/copupcoin.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        secondary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="bg-gray-800 rounded-lg shadow-xl p-8">
            <!-- Logo -->
            <div class="text-center mb-8">
                <img src="../assets/images/copupcoin.png" alt="CopUpCoin" class="w-16 h-16 mx-auto mb-4">
                <h1 class="text-2xl font-bold text-primary">Welcome Back</h1>
                <p class="text-gray-400 mt-2">Sign in to your CopUpBid account</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="identifier" class="block text-sm font-medium text-gray-300 mb-2">
                        Email or Username
                    </label>
                    <input 
                        type="text" 
                        id="identifier" 
                        name="identifier" 
                        required
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400"
                        placeholder="Enter your email or username"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                        Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-400"
                        placeholder="Enter your password"
                    >
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-lg">
                </div>

                <!-- Success Message -->
                <div id="successMessage" class="hidden bg-green-900/50 border border-green-500 text-green-200 px-4 py-3 rounded-lg">
                    Login successful! Redirecting...
                </div>

                <button 
                    type="submit" 
                    id="loginBtn"
                    class="w-full bg-gradient-to-r from-primary to-secondary hover:from-green-600 hover:to-blue-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 transform hover:scale-105"
                >
                    Sign In
                </button>
            </form>

            <!-- Links -->
            <div class="mt-6 text-center space-y-2">
                <p class="text-gray-400">
                    Don't have an account? 
                    <a href="./register.html" class="text-primary hover:text-green-400 font-medium">Sign up here</a>
                </p>
                <a href="../index.html" class="text-gray-400 hover:text-white text-sm">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.copup.copupbid.com/api/auth';
        
        window.addEventListener('DOMContentLoaded', () => {
            const authToken = localStorage.getItem('authToken');
            if (authToken) {
                // User is already logged in, redirect to dashboard
                window.location.href = '../pages/dashboard.html';
            }
        });
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Hide previous messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            
            // Show loading state
            loginBtn.textContent = 'Signing In...';
            loginBtn.disabled = true;
            
            const formData = new FormData(e.target);
            const loginData = {
                identifier: formData.get('identifier'),
                password: formData.get('password')
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token and user data
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userData', JSON.stringify(data.user));
                    
                    // Show success message
                    successMessage.classList.remove('hidden');
                    
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = '../admin/admin-dashboard.html';
                        } else {
                            window.location.href = '../pages/dashboard.html';
                        }
                    }, 1500);
                    
                } else {
                    // Show error message
                    errorMessage.textContent = data.message || 'Login failed. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Network error. Please check your connection and try again.';
                errorMessage.classList.remove('hidden');
            } finally {
                // Reset button state
                loginBtn.textContent = 'Sign In';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
