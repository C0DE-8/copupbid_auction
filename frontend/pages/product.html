<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CopUpBid — Product Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme:{ extend:{ colors:{ cop:{ teal:'#10b981', cyan:'#06b6d4', blue:'#2563eb', accent: '#f59e0b' } } } } }
  </script>
  <style>
    body{ background: radial-gradient(1200px 600px at 20% 10%, rgba(16,185,129,.08), transparent 60%), radial-gradient(1000px 600px at 80% 20%, rgba(37,99,235,.08), transparent 65%), radial-gradient(1000px 800px at 50% 100%, rgba(6,182,212,.08), transparent 60%), #0b1022; }
    .glass{ background: linear-gradient(to bottom right, rgba(22,33,62,.6), rgba(14,23,46,.5)); backdrop-filter: blur(12px); }
    .ring-glow { box-shadow: 0 0 0 1px rgba(255,255,255,.08), 0 15px 40px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06); }
    .chip { border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03); }
  </style>
</head>
<body class="text-slate-100">
  <header class="sticky top-0 z-40 border-b border-white/5 bg-[#0b1022]/85 backdrop-blur">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="./shop.html" class="px-4 py-2 rounded-lg hover:bg-white/5 border border-white/10 font-medium transition">← Back</a>
      <a href="/" class="font-bold text-lg">CopUpBid</a>
      <div class="flex items-center gap-2">
        <a href="./favorites.html" class="relative p-2 rounded-lg hover:bg-white/5 border border-white/10"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg></a>
        <a href="./cart.html" class="relative p-2 rounded-lg hover:bg-white/5 border border-white/10"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg><span id="cartBadge" class="absolute -top-1 -right-1 text-[10px] px-1.5 py-0.5 rounded-full bg-cop-accent text-slate-900 font-bold hidden">0</span></a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-12">
    <div id="wrap" class="grid md:grid-cols-2 gap-10">
      <div class="rounded-2xl glass ring-glow aspect-square overflow-hidden grid place-items-center">
        <img id="pimg" class="max-h-full max-w-full object-contain p-4" alt="Product">
      </div>
      <div class="space-y-6">
        <div>
          <h1 id="pname" class="text-4xl font-black mb-2">Product</h1>
          <div id="pcats" class="text-white/60 text-sm"></div>
        </div>

        <div class="grid grid-cols-3 gap-4">
          <div class="rounded-xl glass ring-glow p-4 text-center">
            <div class="text-xs text-white/60 font-medium mb-2">Cash Price</div>
            <div id="cash" class="text-2xl font-bold">—</div>
          </div>
          <div class="rounded-xl glass ring-glow p-4 text-center">
            <div class="text-xs text-white/60 font-medium mb-2">Auction</div>
            <div id="auction" class="text-2xl font-bold">—</div>
          </div>
          <div class="rounded-xl glass ring-glow p-4 text-center">
            <div class="text-xs text-white/60 font-medium mb-2">auction Mode</div>
            <div id="auction" class="text-2xl font-bold">—</div>
          </div>
        </div>

        <div class="space-y-3">
          <button id="btnBuy" class="w-full px-6 py-4 rounded-xl bg-gradient-to-r from-cop-teal to-cop-cyan text-slate-900 font-bold text-lg hover:shadow-2xl transition">💵 Buy Now</button>
          <div class="grid grid-cols-2 gap-3">
            <button id="btnAuction" class="px-4 py-3 rounded-xl border-2 border-white/20 hover:bg-white/5 font-bold transition">🏁 Auction</button>
            <button id="btnauction" class="px-4 py-3 rounded-xl border-2 border-white/20 hover:bg-white/5 font-bold transition">⚔️ auction</button>
          </div>
        </div>
        <p class="text-white/70 text-sm">Added: <span id="pdate" class="font-medium">—</span></p>
      </div>
    </div>
  </main>

  <div id="toast" class="fixed bottom-4 right-4 hidden px-5 py-3 rounded-lg glass ring-glow text-sm font-medium"></div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const SHOP_API_BASE = 'https://api.copup.copupbid.com/api/users';
    const apiBase = SHOP_API_BASE.replace(/\/$/, '');
    const token = () => (localStorage.getItem('authToken') || '').trim();
    const http = axios.create({ baseURL: apiBase, timeout: 15000 });
    http.interceptors.request.use(cfg => { const t = token(); if (t) cfg.headers.Authorization = 'Bearer ' + t; return cfg; });

    const fmtN = n => (n == null ? '—' : Intl.NumberFormat('en-NG').format(Number(n)));
    const qs = k => new URLSearchParams(location.search).get(k);
    const badge = (id, n)=>{ const el=document.getElementById(id); if(!el) return; if(n>0){ el.textContent=n; el.classList.remove('hidden'); } else el.classList.add('hidden'); };
    const toast = (msg, kind='info') => {
      const el = document.getElementById('toast'); if (!el) return;
      el.textContent = msg;
      el.classList.remove('hidden');
      el.style.background = kind === 'error' ? 'rgba(220,38,38,.2)' : 'linear-gradient(to bottom right, rgba(22,33,62,.6), rgba(14,23,46,.5))';
      setTimeout(()=> el.classList.add('hidden'), 3000);
    };

    async function fetchProduct(id){ const {data}=await http.get(`/products/${id}`); return data; }
    async function checkPay(productId, mode, { qty } = {}){
      const body = { product_id: Number(productId), mode: String(mode) };
      if (mode === 'cash' && qty != null) body.qty = qty;
      const { data } = await http.post('/shop/check-pay', body);
      return data;
    }

    function refreshCartBadge(){
      const n = Number(localStorage.getItem('cartCount') || '0');
      badge('cartBadge', n);
    }

    async function loadProduct(){
      const id = qs('id');
      if (!id){ toast('Missing product id','error'); return; }
      try{
        const p = await fetchProduct(id);
        document.getElementById('pname').textContent = p.name;
        document.getElementById('pimg').src = p.image_url || '';
        document.getElementById('cash').textContent = '₦ ' + fmtN(p.cash_price);
        document.getElementById('auction').textContent = fmtN(p.auction_price);
        document.getElementById('auction').textContent = fmtN(p.auction_price) + ' CP';
        document.getElementById('pdate').textContent = new Date(p.created_at).toLocaleString();
        const cats = (p.categories || []).map(c => c.name).join(', ');
        document.getElementById('pcats').textContent = cats || '—';

        const btnBuy = document.getElementById('btnBuy');
        const btnAuction = document.getElementById('btnAuction');
        const btnauction = document.getElementById('btnauction');

        if (p.allow_cash === 0) { btnBuy.disabled = true; btnBuy.classList.add('opacity-50','cursor-not-allowed'); }
        if (p.allow_auction === 0) { btnAuction.disabled = true; btnAuction.classList.add('opacity-50','cursor-not-allowed'); }
        if (p.allow_auction === 0) { btnauction.disabled = true; btnauction.classList.add('opacity-50','cursor-not-allowed'); }

        btnBuy.addEventListener('click', async () => {
          try{ btnBuy.disabled = true; btnBuy.style.opacity = .6;
            const data = await checkPay(p.id, 'cash', { qty: 1 });
            toast(data.message || 'Added to cart ✓');
            if (data?.created?.type === 'cart_item') {
              const n = Number(localStorage.getItem('cartCount') || '0') + 1;
              localStorage.setItem('cartCount', Math.max(0, n));
              refreshCartBadge();
            }
          }catch(err){ toast(err?.response?.data?.message || 'Checkout failed','error'); }
          finally{ btnBuy.disabled = false; btnBuy.style.opacity = ''; }
        });

        btnAuction.addEventListener('click', async () => {
          try{ btnAuction.disabled = true; btnAuction.style.opacity = .6;
            const data = await checkPay(p.id, 'auction');
            toast(data.message || 'Added to auction ✓');
          }catch(err){ toast(err?.response?.data?.message || 'Failed','error'); }
          finally{ btnAuction.disabled = false; btnAuction.style.opacity = ''; }
        });

        btnauction.addEventListener('click', async () => {
          try{ btnauction.disabled = true; btnauction.style.opacity = .6;
            const data = await checkPay(p.id, 'auction');
            toast(data.message || 'Added to auction ✓');
          }catch(err){ toast(err?.response?.data?.message || 'Failed','error'); }
          finally{ btnauction.disabled = false; btnauction.style.opacity = ''; }
        });

      }catch(err){ toast(err?.response?.data?.message || 'Failed to load','error'); }
    }

    refreshCartBadge();
    loadProduct();
  </script>
</body>
</html>
