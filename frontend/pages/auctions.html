<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction House - copupbid Treasures</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:wght@400;600&display=swap');
        
        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
        }

        .medieval-title {
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, rgb(52 211 153), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .medieval-button {
            background: linear-gradient(135deg, rgb(52 211 153 / 0.8), rgb(52 211 153 / 0.6));
            border: 2px solid rgb(52 211 153 / 0.5);
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .medieval-button:hover {
            background: linear-gradient(135deg, rgb(52 211 153), rgb(52 211 153 / 0.8));
            border-color: rgb(52 211 153);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 211, 153, 0.3);
        }

        .auction-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(52, 211 153, 0.3);
            transition: all 0.3s ease;
        }

        .auction-card:hover {
            border-color: rgb(52 211 153 / 0.6);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(52, 211, 153, 0.2);
        }

        .status-badge {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(52, 211, 153, 0.1), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .auction-image {
            border: 2px solid rgba(52, 211, 153, 0.3);
            transition: all 0.3s ease;
        }

        .auction-image:hover {
            border-color: rgb(52 211 153 / 0.6);
        }

        .fallback-image {
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.1), rgba(52, 211, 153, 0.05));
            border: 2px solid rgba(52, 211, 153, 0.3);
        }

        .view-btn-active {
            box-shadow: 0 0 0 1px rgba(52, 211, 153, 0.7), 0 10px 25px rgba(52, 211, 153, 0.25);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="text-white">
    <!-- Header -->
    <header class="glass border-b border-emerald-400/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between gap-3">
                <!-- Left: CopUpBid brand with logo -->
                <div class="flex items-center gap-3 min-w-0">
                    <a href="javascript:history.back()" class="flex items-center gap-3 min-w-0">
                        <img src="./icons/copupcoin.png" alt="CopUpBid Logo" class="h-9 w-9 rounded-full ring-1 ring-white/10 flex-shrink-0" />
                        <div class="flex flex-col min-w-0">
                            <span class="font-semibold tracking-wide truncate">CopUpBid</span>
                            <span class="text-emerald-300 text-[11px] sm:text-xs truncate">CopUpBid Auction House</span>
                        </div>
                    </a>
                </div>

                <!-- Right: Coin badge + toolbar trigger -->
                <div class="flex items-center gap-2 sm:gap-3">
                    <div class="glass rounded-full px-3 sm:px-4 py-1.5 sm:py-2 flex items-center gap-2">
                        <img src="./icons/copupcoin.png" alt="CopupCoin" class="w-6 h-6 rounded-full ring-1 ring-emerald-400/60" />
                        <span id="coinBadge" class="font-bold cursor-pointer tracking-wide text-sm sm:text-base">***</span>
                    </div>

                    <!-- Toolbar / Sidebar opener -->
                    <button
                        id="openSidebar"
                        class="glass rounded-full p-2 sm:p-2.5 flex items-center justify-center hover:bg-emerald-500/10 hover:border-emerald-400/60 border border-white/10 transition"
                        aria-label="Open toolbar"
                    >
                        <svg class="w-5 h-5 text-emerald-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                                  d="M4 6h16M4 12h10M4 18h8"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Filters -->
    <div class="max-w-7xl mx-auto px-4 py-4 sm:py-6">
        <div class="glass rounded-xl p-3 sm:p-4 mb-5 sm:mb-6">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 sm:gap-4">
                <!-- View toggle: Active + Hold + Pending vs Completed -->
                <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                    <button
                        onclick="changeView('hp', event)"
                        class="view-btn medieval-button px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm flex-1 sm:flex-initial flex items-center justify-center gap-2 view-btn-active"
                    >
                        <span>🔥</span>
                        <span>Active, Hold & Pending</span>
                    </button>
                    <button
                        onclick="changeView('completed', event)"
                        class="view-btn medieval-button px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm flex-1 sm:flex-initial flex items-center justify-center gap-2 opacity-80"
                    >
                        <span>🏆</span>
                        <span>Completed</span>
                    </button>
                </div>

                <!-- Category filter -->
                <div class="flex w-full sm:w-auto">
                    <select
                        id="categoryFilter"
                        onchange="applyFilters()"
                        class="glass rounded-lg px-3 py-2 text-sm border border-emerald-400/30 bg-slate-900/80 w-full sm:w-48"
                    >
                        <option value="">All Categories</option>
                        <option value="cash">Cash</option>
                        <option value="product">Product</option>
                        <option value="coupon">Coupon</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Auctions Grid -->
        <div id="auctionsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
            <!-- Loading skeleton will be inserted here -->
        </div>

        <!-- Load More Button -->
        <div id="loadMoreContainer" class="text-center mt-6 sm:mt-8" style="display: none;">
            <button id="loadMoreBtn" onclick="loadMoreAuctions()" class="medieval-button px-8 py-3 rounded-lg text-sm sm:text-base">
                Load More Auctions
            </button>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-10 sm:py-12" style="display: none;">
            <div class="glass rounded-xl p-6 sm:p-8 max-w-md mx-auto">
                <div class="text-5xl sm:text-6xl mb-4">🏺</div>
                <h3 class="medieval-title text-lg sm:text-xl font-bold mb-2">No Auctions Found</h3>
                <p class="text-gray-400 text-sm sm:text-base">No auctions match your current filters.</p>
            </div>
        </div>
    </div>

    <!-- Loading State Template -->
    <div id="loadingState" style="display: none;">
        <div class="auction-card rounded-xl p-5 sm:p-6 relative overflow-hidden">
            <div class="shimmer absolute inset-0"></div>
            <div class="space-y-4">
                <div class="bg-gray-700 h-40 sm:h-48 rounded-xl"></div>
                <div class="bg-gray-700 h-5 sm:h-6 rounded w-3/4"></div>
                <div class="bg-gray-700 h-4 rounded w-1/2"></div>
                <div class="flex justify-between gap-3">
                    <div class="bg-gray-700 h-8 rounded w-20"></div>
                    <div class="bg-gray-700 h-8 rounded w-24"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Nice Alert Modal -->
    <div id="alertModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur">
        <div class="bg-slate-900/95 border border-emerald-400/40 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
            <div class="flex items-start gap-3">
                <div id="alertIcon" class="text-2xl">✅</div>
                <div>
                    <h3 id="alertTitle" class="medieval-title text-lg font-bold mb-1">Alert Title</h3>
                    <p id="alertMessage" class="text-sm text-gray-200 leading-relaxed">Alert message goes here.</p>
                </div>
            </div>
            <div class="mt-5 flex justify-end">
                <button onclick="closeAlertModal()" class="medieval-button px-5 py-2 rounded-lg text-sm">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Sidebar overlay and navigation (Toolbar) -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden"></div>
    <div id="sidebar" class="fixed top-0 right-0 h-full w-80 max-w-full bg-gray-900 z-50 transform translate-x-full transition-transform duration-300 ease-in-out">
        <div class="p-6 h-full flex flex-col">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">Tool bar</h2>
                <button id="closeSidebar" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        
            <!-- User / Profile -->
            <div class="flex items-center gap-3 mb-5">
                <img src="./icons/anime-emoji.png" alt="avatar" class="w-12 h-12 rounded-full border border-white/20 object-cover">
                <div>
                    <div id="sidebarUserName" class="font-semibold text-white truncate">User</div>
                    <a href="../pages/profile.html" class="text-sm text-white/60 hover:text-white">View profile</a>
                </div>
            </div>

            <nav class="space-y-2 flex-1 overflow-y-auto pb-4">
                <!-- Primary actions (most used) -->
                <div class="flex flex-col gap-2 pb-3 border-b border-white/10 mb-3">
                    <a href="../pages/auctions.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors">
                        <svg class="w-5 h-5 text-white/80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M3 6h18M8 6v12a1 1 0 001 1h6a1 1 0 001-1V6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="text-sm font-medium">Auctions</span>
                    </a>

                    <a href="../pages/heist.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors">
                        <svg class="w-5 h-5 text-white/80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 2C8.134 2 5 5.134 5 9v2a7 7 0 0014 0V9c0-3.866-3.134-7-7-7z" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="text-sm font-medium">Heist</span>
                    </a>

                    <a href="../pages/cart.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors">
                        <svg class="w-5 h-5 text-white/80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M3 3h2l.4 2M7 13h10l4-8H5.4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="10" cy="20" r="1"></circle>
                            <circle cx="18" cy="20" r="1"></circle>
                        </svg>
                        <span class="text-sm font-medium">Cart</span>
                    </a>

                    <a href="../pages/trade.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors">
                        <svg class="w-5 h-5 text-white/80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 2l2.39 4.85L19 8l-3.06 2.97L16.78 15 12 12.77 7.22 15l.84-4.03L5 8l4.61-.15L12 2z" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="text-sm font-medium">Trade</span>
                    </a>

                    <a href="../pages/favorites.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors">
                        <svg class="w-5 h-5 text-white/80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 21l-7-6a5 5 0 017-7 5 5 0 017 7z" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="text-sm font-medium">Favorites</span>
                    </a>
                </div>

                <!-- Secondary actions -->
                <div class="flex flex-col gap-2 pb-3 border-b border-white/10 mb-3">
                    <a href="../pages/affiliate.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors">
                        <svg class="w-5 h-5 text-white/80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M7 7h10v10H7z" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="text-sm font-medium">Affiliate</span>
                    </a>

                    <a href="../pages/waitlist.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors">
                        <svg class="w-5 h-5 text-white/80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 8v4l3 3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="9" stroke-width="1.5"></circle>
                        </svg>
                        <span class="text-sm font-medium">Waitlist</span>
                    </a>

                    <a href="../pages/winners.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors">
                        <svg class="w-5 h-5 text-white/80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 2l2.39 4.85L19 8l-3.06 2.97L16.78 15 12 12.77 7.22 15l.84-4.03L5 8l4.61-.15L12 2z" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="text-sm font-medium">Winners</span>
                    </a>

                    <a href="../pages/how-to-play.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors">

            </nav>

            <!-- Footer / Logout -->
            <div class="mt-3">
                <button
                    id="sidebarLogout"
                    class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg bg-red-600 hover:bg-red-700 transition-colors"
                >
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 17l5-5-5-5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 12H9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="text-sm font-semibold text-white">Logout</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.copup.copupbid.com/api/users';
        const IMAGE_BASE = 'https://api.copup.copupbid.com';
        let currentPage = 1;
        let currentCategory = '';
        let allAuctions = [];
        let isLoading = false;
        let viewMode = 'hp'; // 'hp' = active + hold + pending, 'completed' = completed only

        // Authentication check
        const authToken = localStorage.getItem('authToken');
        if (!authToken) {
            window.location.href = '../auth/login.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Load data
            loadUserBalance();
            showLoadingSkeleton();
            loadAuctions();

            // Sidebar / toolbar controls
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const sidebar = document.getElementById('sidebar');
            const openSidebarBtn = document.getElementById('openSidebar');
            const closeSidebarBtn = document.getElementById('closeSidebar');
            const sidebarLogout = document.getElementById('sidebarLogout');

            function openSidebar() {
                sidebarOverlay.classList.remove('hidden');
                sidebar.classList.remove('translate-x-full');
            }

            function closeSidebar() {
                sidebar.classList.add('translate-x-full');
                sidebarOverlay.classList.add('hidden');
            }

            openSidebarBtn?.addEventListener('click', openSidebar);
            closeSidebarBtn?.addEventListener('click', closeSidebar);
            sidebarOverlay?.addEventListener('click', closeSidebar);

            sidebarLogout?.addEventListener('click', () => {
                localStorage.removeItem('authToken');
                window.location.href = '../auth/login.html';
            });
        });

        // Load user balance & name
        async function loadUserBalance() {
            try {
                const response = await fetch(`${API_BASE}/profile`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const userData = await response.json();
                    const coinBadge = document.getElementById('coinBadge');
                    const sidebarUserName = document.getElementById('sidebarUserName');
                    let actualBalance = userData.bid_points || 0;
                    const displayName = userData.full_name || userData.name || userData.username || 'User';

                    if (sidebarUserName) {
                        sidebarUserName.textContent = displayName;
                    }
                    
                    coinBadge.onclick = function() {
                        if (coinBadge.textContent === '***') {
                            coinBadge.textContent = actualBalance;
                        } else {
                            coinBadge.textContent = '***';
                        }
                    };
                }
            } catch (error) {
                console.error('Error loading user balance:', error);
            }
        }

        // Nice alert modal helpers
        function showAlertModal(title, message, type = 'info') {
            const modal = document.getElementById('alertModal');
            const titleEl = document.getElementById('alertTitle');
            const msgEl = document.getElementById('alertMessage');
            const iconEl = document.getElementById('alertIcon');

            titleEl.textContent = title || '';
            msgEl.textContent = message || '';

            if (type === 'success') {
                iconEl.textContent = '✅';
            } else if (type === 'error') {
                iconEl.textContent = '⚠️';
            } else {
                iconEl.textContent = 'ℹ️';
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeAlertModal() {
            const modal = document.getElementById('alertModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // Show loading skeleton
        function showLoadingSkeleton() {
            const auctionsList = document.getElementById('auctionsList');
            const loadingTemplate = document.getElementById('loadingState');
            
            auctionsList.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const skeleton = loadingTemplate.cloneNode(true);
                skeleton.style.display = 'block';
                skeleton.removeAttribute('id');
                auctionsList.appendChild(skeleton);
            }
        }

        // Load auctions
        async function loadAuctions(reset = true) {
            if (isLoading) return;
            isLoading = true;

            try {
                if (reset) {
                    currentPage = 1;
                    allAuctions = [];
                }

                const params = new URLSearchParams({
                    page: currentPage,
                    limit: 12
                });

                if (viewMode === 'completed') {
                    params.append('status', 'completed');
                }
                if (currentCategory) {
                    params.append('category', currentCategory);
                }

                const response = await fetch(`${API_BASE}/auctions?${params}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    if (reset) {
                        allAuctions = result.data || [];
                    } else {
                        allAuctions = [...allAuctions, ...(result.data || [])];
                    }

                    displayAuctions();
                    
                    const loadMoreContainer = document.getElementById('loadMoreContainer');
                    const hasMore = (currentPage * 12) < (result.total || 0);
                    loadMoreContainer.style.display = hasMore ? 'block' : 'none';
                } else {
                    throw new Error('Failed to load auctions');
                }
            } catch (error) {
                console.error('Error loading auctions:', error);
                showErrorState();
            } finally {
                isLoading = false;
            }
        }

        // Display auctions with view filter + ordering (active first)
        function displayAuctions() {
            const auctionsList = document.getElementById('auctionsList');
            const emptyState = document.getElementById('emptyState');

            let visible = allAuctions || [];

            if (viewMode === 'hp') {
                visible = visible.filter(a => {
                    const s = String(a.status || '').toLowerCase();
                    return s === 'active' || s === 'pending' || s === 'hold' || s === 'on-hold';
                });

                // sort so active at top, then hold/on-hold, then pending
                const orderMap = {
                    'active': 0,
                    'hold': 1,
                    'on-hold': 1,
                    'pending': 2
                };
                visible.sort((a, b) => {
                    const sa = String(a.status || '').toLowerCase();
                    const sb = String(b.status || '').toLowerCase();
                    const oa = orderMap[sa] ?? 99;
                    const ob = orderMap[sb] ?? 99;
                    return oa - ob;
                });
            } else if (viewMode === 'completed') {
                visible = visible.filter(a => String(a.status).toLowerCase() === 'completed');
            }

            if (visible.length === 0) {
                auctionsList.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            auctionsList.innerHTML = visible.map(auction => createAuctionCard(auction)).join('');
        }

        // Create auction card
        function createAuctionCard(auction) {
            const statusColors = {
                pending: 'bg-yellow-500/20 text-yellow-300 border-yellow-500/30',
                hold: 'bg-orange-500/20 text-orange-300 border-orange-500/30',
                'on-hold': 'bg-orange-500/20 text-orange-300 border-orange-500/30',
                active: 'bg-green-500/20 text-green-300 border-green-500/30',
                completed: 'bg-blue-500/20 text-blue-300 border-blue-500/30',
                cancelled: 'bg-red-500/20 text-red-300 border-red-500/30'
            };

            const statusKey = String(auction.status || 'pending').toLowerCase();
            const badgeClass = statusColors[statusKey] || statusColors.pending;

            const imageUrl = auction.image_url || auction.image;
            const fullImageUrl = imageUrl && !imageUrl.startsWith('http') ? `${IMAGE_BASE}${imageUrl}` : imageUrl;

            return `
                <div class="auction-card rounded-xl p-5 sm:p-6 cursor-pointer" onclick="viewAuction(${auction.id})">
                    <div class="relative mb-4">
                        <div class="image-container">
                            <img src="${fullImageUrl || ''}" 
                                 alt="${auction.name}" 
                                 class="w-full h-40 sm:h-48 object-contain rounded-xl auction-image"
                                 crossorigin="anonymous"
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div class="fallback-image w-full h-40 sm:h-48 rounded-xl flex flex-col items-center justify-center text-center" style="display: none;">
                                <div class="text-4xl mb-2">💎</div>
                                <div class="text-emerald-300 font-bold text-lg">AUCTION ITEM</div>
                                <div class="text-emerald-400/60 text-sm">Legendary Treasure</div>
                            </div>
                        </div>
                        <div class="absolute top-3 right-3">
                            <span class="status-badge ${badgeClass} px-3 py-1 rounded-full border text-xs">
                                ${String(auction.status || 'PENDING').toUpperCase()}
                            </span>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <h3 class="medieval-title text-lg sm:text-xl font-bold line-clamp-2">${auction.name}</h3>
                        <p class="text-gray-300 text-sm line-clamp-2">${auction.description || 'Legendary auction item'}</p>
                        
                        <div class="flex items-center justify-between gap-4">
                            <div class="text-center flex-1">
                                <div class="text-emerald-400 text-xs sm:text-sm">Entry Fee</div>
                                <div class="font-bold text-sm sm:text-base">${auction.entry_bid_points} 💰</div>
                            </div>
                            <div class="text-center flex-1">
                                <div class="text-emerald-400 text-xs sm:text-sm">Category</div>
                                <div class="font-bold capitalize text-sm sm:text-base">${auction.category}</div>
                            </div>
                        </div>

                        <div class="pt-3 border-t border-emerald-400/20">
                            ${
                                (String(auction.status).toLowerCase() === 'pending' ||
                                 String(auction.status).toLowerCase() === 'hold' ||
                                 String(auction.status).toLowerCase() === 'on-hold')
                                ? `
                                    <button onclick="event.stopPropagation(); payEntryFee(${auction.id})" 
                                            class="medieval-button w-full py-2 rounded-lg text-sm">
                                        Pay Entry Fee
                                    </button>
                                  `
                                : String(auction.status).toLowerCase() === 'active'
                                ? `
                                    <div class="flex flex-col sm:flex-row gap-2">
                                        <button onclick="event.stopPropagation(); payEntryFee(${auction.id})" 
                                                class="medieval-button w-full sm:w-1/2 py-2 rounded-lg text-sm">
                                            Pay Entry Fee
                                        </button>
                                        <button onclick="event.stopPropagation(); viewAuction(${auction.id})" 
                                                class="medieval-button w-full sm:w-1/2 py-2 rounded-lg text-sm">
                                            Enter Auction
                                        </button>
                                    </div>
                                  `
                                : `
                                    <button onclick="event.stopPropagation(); viewAuction(${auction.id})" 
                                            class="medieval-button w-full py-2 rounded-lg text-sm opacity-60">
                                        View Results
                                    </button>
                                  `
                            }
                        </div>
                    </div>
                </div>
            `;
        }

        // Change view (Active+Hold+Pending / Completed)
        function changeView(mode, ev) {
            viewMode = mode;

            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('view-btn-active');
                btn.classList.add('opacity-80');
            });

            if (ev && ev.currentTarget) {
                ev.currentTarget.classList.add('view-btn-active');
                ev.currentTarget.classList.remove('opacity-80');
            }

            showLoadingSkeleton();
            loadAuctions(true);
        }

        // Category filter
        function applyFilters() {
            currentCategory = document.getElementById('categoryFilter').value;
            showLoadingSkeleton();
            loadAuctions(true);
        }

        // Load more auctions
        function loadMoreAuctions() {
            currentPage++;
            loadAuctions(false);
        }

        // Pay entry fee
        async function payEntryFee(auctionId) {
            try {
                const response = await fetch(`${API_BASE}/pay-entry/${auctionId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (response.ok) {
                    showAlertModal(
                        'Entry Fee Paid',
                        'Entry fee paid successfully! You can now participate in this auction.',
                        'success'
                    );
                    loadUserBalance();
                    loadAuctions(true);
                } else {
                    showAlertModal(
                        'Payment Failed',
                        result.message || 'Failed to pay entry fee.',
                        'error'
                    );
                }
            } catch (error) {
                console.error('Error paying entry fee:', error);
                showAlertModal(
                    'Error',
                    'Error paying entry fee. Please try again.',
                    'error'
                );
            }
        }

        // View auction details
        function viewAuction(auctionId) {
            window.location.href = `auction-detail.html?id=${auctionId}`;
        }

        // Show error state
        function showErrorState() {
            const auctionsList = document.getElementById('auctionsList');
            auctionsList.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <div class="glass rounded-xl p-8 max-w-md mx-auto">
                        <div class="text-6xl mb-4">⚠️</div>
                        <h3 class="medieval-title text-xl font-bold mb-2">Loading Failed</h3>
                        <p class="text-gray-400 mb-4">Unable to load auctions. Please try again.</p>
                        <button onclick="loadAuctions(true)" class="medieval-button px-6 py-2 rounded-lg">
                            Retry
                        </button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
