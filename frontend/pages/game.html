<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - CopUpBid</title>
    <link rel="icon" href="../assets/images/copupcoin.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        secondary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <img src="../assets/images/copupcoin.png" alt="CopUpBid" class="h-8 w-8 mr-3">
                    <h1 class="text-xl font-bold text-primary">CopUp Games</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userGreeting" class="text-gray-300"></span>
                    <div class="flex items-center bg-gray-700 rounded-lg px-3 py-2">
                        <img src="../assets/images/copupcoin.png" alt="CopUp Coin" class="h-5 w-5 mr-2">
                        <span id="userBalance" class="text-primary font-semibold">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Loading State -->
    <div id="loadingState" class="flex justify-center items-center min-h-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
    </div>

    <!-- Main Game Content -->
    <div id="gameContent" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Welcome Section -->
        <div class="bg-gradient-to-r from-primary/20 to-secondary/20 rounded-lg p-6 border border-gray-700 mb-8">
            <h2 class="text-2xl font-bold mb-2">Earn CopUp Coins Playing Games!</h2>
            <p class="text-gray-300">Complete daily tasks, play mini-games, and earn coins to use in auctions. The more you play, the more you earn!</p>
        </div>

        <!-- Daily Tasks Section -->
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 mb-8">
            <h3 class="text-xl font-semibold mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 2.828 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-2.828 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-2.828 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path>
                </svg>
                Daily Tasks
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="dailyTasks">
                <!-- Daily tasks will be loaded here -->
            </div>
        </div>

        <!-- Mini Games Section -->
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 mb-8">
            <h3 class="text-xl font-semibold mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
                </svg>
                Mini Games
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="miniGames">
                <!-- Mini games will be loaded here -->
            </div>
        </div>

        <!-- Leaderboard Section -->
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h3 class="text-xl font-semibold mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                </svg>
                Top Earners This Week
            </h3>
            <div class="space-y-3" id="leaderboard">
                <!-- Leaderboard will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Game Modal -->
    <div id="gameModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-gray-800 rounded-lg p-6 max-w-md w-full mx-4 border border-gray-700">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold" id="gameModalTitle">Game</h3>
                <button onclick="closeGameModal()" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="gameModalContent">
                <!-- Game content will be populated here -->
            </div>
        </div>
    </div>

    <!-- Mobile Navigation Footer -->
    <nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 z-30">
        <div class="flex justify-around items-center py-2">
            <a href="dashboard.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-primary transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5v4"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v4"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 5v4"></path>
                </svg>
                <span class="text-xs font-medium">Dashboard</span>
            </a>
            <a href="auction.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-primary transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                </svg>
                <span class="text-xs font-medium">Auction</span>
            </a>
            <a href="game.html" class="flex flex-col items-center p-2 text-primary">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
                </svg>
                <span class="text-xs font-medium">Game</span>
            </a>
        </div>
    </nav>

    <script>
        let userBidPoints = 0;
        let dailyTasksData = [
            { id: 1, title: "Login Daily", description: "Sign in to your account", reward: 10, completed: true },
            { id: 2, title: "Visit Auction Page", description: "Browse available auctions", reward: 15, completed: false },
            { id: 3, title: "Place a Bid", description: "Participate in any auction", reward: 25, completed: false },
            { id: 4, title: "Share CopUpBid", description: "Invite a friend to join", reward: 50, completed: false }
        ];

        let miniGamesData = [
            {
                id: 1,
                title: "Coin Flip",
                description: "Guess heads or tails to win coins",
                reward: "5-20 coins",
                plays: 3,
                icon: "🪙"
            },
            {
                id: 2,
                title: "Lucky Spin",
                description: "Spin the wheel for random rewards",
                reward: "10-100 coins",
                plays: 2,
                icon: "🎰"
            },
            {
                id: 3,
                title: "Number Guess",
                description: "Guess the number between 1-10",
                reward: "15-50 coins",
                plays: 5,
                icon: "🎯"
            }
        ];

        let leaderboardData = [
            { rank: 1, name: "Emeka O.", location: "Asaba", coins: 2450 },
            { rank: 2, name: "Blessing A.", location: "Warri", coins: 2180 },
            { rank: 3, name: "Chidi N.", location: "Ughelli", coins: 1950 },
            { rank: 4, name: "Grace I.", location: "Sapele", coins: 1720 },
            { rank: 5, name: "Samuel K.", location: "Abraka", coins: 1580 }
        ];

        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '../auth/login.html';
                return;
            }
            loadGamePage();
        });

        async function loadGamePage() {
            const token = localStorage.getItem('authToken');
            
            try {
                // Load user profile for balance
                await loadUserProfile(token);
                
                // Load game content
                displayDailyTasks();
                displayMiniGames();
                displayLeaderboard();
                
                // Show game content
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('gameContent').classList.remove('hidden');
                
            } catch (error) {
                console.error('Error loading game page:', error);
                if (error.message.includes('401') || error.message.includes('403')) {
                    localStorage.removeItem('authToken');
                    window.location.href = '../auth/login.html';
                }
            }
        }

        async function loadUserProfile(token) {
            const response = await fetch('https://api.copupbid.com/api/user/profile', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`Profile fetch failed: ${response.status}`);
            }

            const profile = await response.json();
            
            userBidPoints = profile.bid_points || 0;
            
            // Update UI with profile data
            document.getElementById('userGreeting').textContent = `Hello, ${profile.full_name || profile.username}`;
            document.getElementById('userBalance').textContent = userBidPoints.toLocaleString();
        }

        function displayDailyTasks() {
            const container = document.getElementById('dailyTasks');
            
            container.innerHTML = dailyTasksData.map(task => `
                <div class="bg-gray-700/50 rounded-lg p-4 border border-gray-600">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-semibold">${task.title}</h4>
                        <span class="text-primary font-medium">+${task.reward} coins</span>
                    </div>
                    <p class="text-gray-400 text-sm mb-3">${task.description}</p>
                    <button onclick="completeTask(${task.id})" class="w-full py-2 px-4 rounded-lg font-medium transition-colors ${
                        task.completed 
                            ? 'bg-green-500/20 text-green-400 cursor-not-allowed' 
                            : 'bg-primary hover:bg-primary/80 text-white'
                    }" ${task.completed ? 'disabled' : ''}>
                        ${task.completed ? 'Completed ✓' : 'Complete Task'}
                    </button>
                </div>
            `).join('');
        }

        function displayMiniGames() {
            const container = document.getElementById('miniGames');
            
            container.innerHTML = miniGamesData.map(game => `
                <div class="bg-gray-700/50 rounded-lg p-4 border border-gray-600 text-center">
                    <div class="text-4xl mb-3">${game.icon}</div>
                    <h4 class="font-semibold mb-2">${game.title}</h4>
                    <p class="text-gray-400 text-sm mb-3">${game.description}</p>
                    <div class="mb-3">
                        <span class="text-primary font-medium">${game.reward}</span>
                        <p class="text-xs text-gray-400">${game.plays} plays left today</p>
                    </div>
                    <button onclick="playGame(${game.id})" class="w-full py-2 px-4 rounded-lg font-medium transition-colors ${
                        game.plays > 0 
                            ? 'bg-primary hover:bg-primary/80 text-white' 
                            : 'bg-gray-600 text-gray-400 cursor-not-allowed'
                    }" ${game.plays === 0 ? 'disabled' : ''}>
                        ${game.plays > 0 ? 'Play Now' : 'No Plays Left'}
                    </button>
                </div>
            `).join('');
        }

        function displayLeaderboard() {
            const container = document.getElementById('leaderboard');
            
            container.innerHTML = leaderboardData.map(player => `
                <div class="flex items-center justify-between p-3 bg-gray-700/50 rounded-lg">
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center mr-3">
                            <span class="text-primary font-bold text-sm">${player.rank}</span>
                        </div>
                        <div>
                            <p class="font-medium">${player.name}</p>
                            <p class="text-xs text-gray-400">${player.location}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-semibold text-primary">${player.coins.toLocaleString()}</p>
                        <p class="text-xs text-gray-400">coins earned</p>
                    </div>
                </div>
            `).join('');
        }

        function completeTask(taskId) {
            const task = dailyTasksData.find(t => t.id === taskId);
            if (!task || task.completed) return;
            
            task.completed = true;
            userBidPoints += task.reward;
            
            // Update UI
            document.getElementById('userBalance').textContent = userBidPoints.toLocaleString();
            displayDailyTasks();
            
            alert(`Task completed! You earned ${task.reward} coins.`);
        }

        function playGame(gameId) {
            const game = miniGamesData.find(g => g.id === gameId);
            if (!game || game.plays === 0) return;
            
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('gameModalTitle');
            const content = document.getElementById('gameModalContent');
            
            title.textContent = game.title;
            
            if (gameId === 1) { // Coin Flip
                content.innerHTML = `
                    <div class="text-center">
                        <div class="text-6xl mb-4">🪙</div>
                        <p class="mb-4">Choose heads or tails!</p>
                        <div class="flex space-x-3 mb-4">
                            <button onclick="coinFlip('heads')" class="flex-1 bg-primary hover:bg-primary/80 text-white py-2 px-4 rounded-lg">
                                Heads
                            </button>
                            <button onclick="coinFlip('tails')" class="flex-1 bg-secondary hover:bg-secondary/80 text-white py-2 px-4 rounded-lg">
                                Tails
                            </button>
                        </div>
                        <p class="text-sm text-gray-400">Plays left: ${game.plays}</p>
                    </div>
                `;
            } else if (gameId === 2) { // Lucky Spin
                content.innerHTML = `
                    <div class="text-center">
                        <div class="text-6xl mb-4">🎰</div>
                        <p class="mb-4">Spin the wheel for a chance to win big!</p>
                        <button onclick="luckySpin()" class="w-full bg-primary hover:bg-primary/80 text-white py-2 px-4 rounded-lg mb-4">
                            Spin Now!
                        </button>
                        <p class="text-sm text-gray-400">Plays left: ${game.plays}</p>
                    </div>
                `;
            } else if (gameId === 3) { // Number Guess
                content.innerHTML = `
                    <div class="text-center">
                        <div class="text-6xl mb-4">🎯</div>
                        <p class="mb-4">Guess a number between 1 and 10!</p>
                        <input type="number" id="guessInput" min="1" max="10" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-center mb-4" placeholder="Enter your guess">
                        <button onclick="numberGuess()" class="w-full bg-primary hover:bg-primary/80 text-white py-2 px-4 rounded-lg mb-4">
                            Submit Guess
                        </button>
                        <p class="text-sm text-gray-400">Plays left: ${game.plays}</p>
                    </div>
                `;
            }
            
            modal.classList.remove('hidden');
        }

        function closeGameModal() {
            document.getElementById('gameModal').classList.add('hidden');
        }

        function coinFlip(choice) {
            const result = Math.random() < 0.5 ? 'heads' : 'tails';
            const won = choice === result;
            const reward = won ? Math.floor(Math.random() * 16) + 5 : 0; // 5-20 coins
            
            if (won) {
                userBidPoints += reward;
                document.getElementById('userBalance').textContent = userBidPoints.toLocaleString();
                alert(`🎉 You won! The coin landed on ${result}. You earned ${reward} coins!`);
            } else {
                alert(`😔 You lost! The coin landed on ${result}. Better luck next time!`);
            }
            
            // Decrease plays
            const game = miniGamesData.find(g => g.id === 1);
            game.plays--;
            displayMiniGames();
            closeGameModal();
        }

        function luckySpin() {
            const rewards = [10, 15, 20, 25, 30, 50, 75, 100];
            const reward = rewards[Math.floor(Math.random() * rewards.length)];
            
            userBidPoints += reward;
            document.getElementById('userBalance').textContent = userBidPoints.toLocaleString();
            
            alert(`🎰 Spin complete! You won ${reward} coins!`);
            
            // Decrease plays
            const game = miniGamesData.find(g => g.id === 2);
            game.plays--;
            displayMiniGames();
            closeGameModal();
        }

        function numberGuess() {
            const guess = parseInt(document.getElementById('guessInput').value);
            const target = Math.floor(Math.random() * 10) + 1;
            
            if (!guess || guess < 1 || guess > 10) {
                alert('Please enter a number between 1 and 10!');
                return;
            }
            
            const won = guess === target;
            const reward = won ? Math.floor(Math.random() * 36) + 15 : 0; // 15-50 coins
            
            if (won) {
                userBidPoints += reward;
                document.getElementById('userBalance').textContent = userBidPoints.toLocaleString();
                alert(`🎯 Correct! The number was ${target}. You earned ${reward} coins!`);
            } else {
                alert(`❌ Wrong! The number was ${target}. Your guess was ${guess}. Try again!`);
            }
            
            // Decrease plays
            const game = miniGamesData.find(g => g.id === 3);
            game.plays--;
            displayMiniGames();
            closeGameModal();
        }
    </script>

    <style>
        body {
            padding-bottom: 80px;
        }
        
        @media (min-width: 768px) {
            body {
                padding-bottom: 0;
            }
            
            nav {
                display: none;
            }
        }
    </style>
</body>
</html>
