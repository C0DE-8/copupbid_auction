<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - CopUpBid</title>
    <link rel="icon" href="../assets/images/copupcoin.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        secondary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <button onclick="goBack()" class="mr-4 p-2 hover:bg-gray-700 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    <img src="../assets/images/copupcoin.png" alt="CopUpBid" class="h-8 w-8 mr-3">
                    <h1 class="text-xl font-bold text-primary">Transaction History</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-gray-300 hover:text-white transition-colors">Dashboard</a>
                    <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Loading State -->
    <div id="loadingState" class="flex justify-center items-center min-h-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
    </div>

    <!-- History Content -->
    <div id="historyContent" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Tab Navigation -->
        <div class="mb-8">
            <div class="border-b border-gray-700">
                <nav class="-mb-px flex space-x-8">
                    <button onclick="switchTab('payouts')" id="payoutsTab" class="tab-button active py-4 px-1 border-b-2 font-medium text-sm">
                        <div class="flex items-center">
                            <img src="../assets/icons/payout.png" alt="Payout" class="w-5 h-5 mr-2">
                            Payout History
                        </div>
                    </button>
                    <button onclick="switchTab('payments')" id="paymentsTab" class="tab-button py-4 px-1 border-b-2 font-medium text-sm">
                        <div class="flex items-center">
                            <img src="../assets/icons/payment-history.png" alt="Payment" class="w-5 h-5 mr-2">
                            Payment History
                        </div>
                    </button>
                </nav>
            </div>
        </div>

        <!-- Payout History Tab -->
        <div id="payoutsContent" class="tab-content">
            <div class="bg-gray-800 rounded-lg border border-gray-700">
                <div class="p-6 border-b border-gray-700">
                    <h2 class="text-xl font-semibold text-white flex items-center">
                        <img src="../assets/icons/payout.png" alt="Payout" class="w-6 h-6 mr-3">
                        All Payouts
                    </h2>
                </div>
                <div class="p-6">
                    <div id="allPayoutHistory" class="space-y-4">
                        <div class="text-center text-gray-400 py-8">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mx-auto mb-4"></div>
                            <p>Loading payout history...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Payment History Tab -->
        <div id="paymentsContent" class="tab-content hidden">
            <div class="bg-gray-800 rounded-lg border border-gray-700">
                <div class="p-6 border-b border-gray-700">
                    <h2 class="text-xl font-semibold text-white flex items-center">
                        <img src="../assets/icons/payment-history.png" alt="Payment" class="w-6 h-6 mr-3">
                        All Payments
                    </h2>
                </div>
                <div class="p-6">
                    <div id="allPaymentHistory" class="space-y-4">
                        <div class="text-center text-gray-400 py-8">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mx-auto mb-4"></div>
                            <p>Loading payment history...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Added mobile navigation footer bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 z-30">
        <div class="flex justify-around items-center py-2">
            <a href="dashboard.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-primary transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5v4"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v4"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 5v4"></path>
                </svg>
                <span class="text-xs font-medium">Dashboard</span>
            </a>
            <a href="auction.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-primary transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                </svg>
                <span class="text-xs font-medium">Auction</span>
            </a>
            <a href="game.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-primary transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
                </svg>
                <span class="text-xs font-medium">Game</span>
            </a>
        </div>
    </nav>

    <script>
        let currentTab = 'payouts';

        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '../auth/login.html';
                return;
            }
            loadHistory();
        });

        async function loadHistory() {
            const token = localStorage.getItem('authToken');
            
            try {
                // Load both histories
                await Promise.all([
                    loadAllPayoutHistory(token),
                    loadAllPaymentHistory(token)
                ]);
                
                // Show history content
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('historyContent').classList.remove('hidden');
                
            } catch (error) {
                console.error('Error loading history:', error);
                if (error.message.includes('401') || error.message.includes('403')) {
                    localStorage.removeItem('authToken');
                    window.location.href = '../auth/login.html';
                }
            }
        }

        async function loadAllPayoutHistory(token) {
            try {
                const response = await fetch('https://api.copupbid.com/api/tap/payout-history', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Payout history fetch failed: ${response.status}`);
                }

                const payouts = await response.json();
                displayAllPayoutHistory(payouts);
                
            } catch (error) {
                console.error('Error loading payout history:', error);
                document.getElementById('allPayoutHistory').innerHTML = `
                    <div class="text-center text-gray-400 py-8">
                        <p>No payout history available</p>
                    </div>
                `;
            }
        }

        async function loadAllPaymentHistory(token) {
            try {
                const response = await fetch('https://api.copupbid.com/api/manualPayment/payment-history', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Payment history fetch failed: ${response.status}`);
                }

                const payments = await response.json();
                displayAllPaymentHistory(payments);
                
            } catch (error) {
                console.error('Error loading payment history:', error);
                document.getElementById('allPaymentHistory').innerHTML = `
                    <div class="text-center text-gray-400 py-8">
                        <p>No payment history available</p>
                    </div>
                `;
            }
        }

        function displayAllPayoutHistory(payouts) {
            const container = document.getElementById('allPayoutHistory');
            
            if (!payouts || payouts.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 py-8">
                        <img src="../assets/icons/payout.png" alt="No payouts" class="w-16 h-16 mx-auto mb-4 opacity-50">
                        <p>No payouts yet</p>
                        <p class="text-sm mt-2">Your payout history will appear here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = payouts.map(payout => `
                <div class="flex justify-between items-center p-4 bg-gray-700/50 rounded-lg hover:bg-gray-700/70 transition-colors">
                    <div class="flex items-center">
                        <img src="../assets/icons/payout.png" alt="Payout" class="w-8 h-8 mr-4">
                        <div>
                            <p class="font-medium text-white">${parseFloat(payout.bid_points || payout.amount || 0).toLocaleString()} coins - ${(payout.status || 'Pending').charAt(0).toUpperCase() + (payout.status || 'pending').slice(1)}</p>
                            <p class="text-sm text-gray-400">${formatDate(payout.created_at)}</p>
                            ${payout.account_name ? `<p class="text-xs text-gray-500 mt-1">To: ${payout.account_name}</p>` : ''}
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="px-3 py-1 text-xs rounded-full ${getStatusColor(payout.status)}">
                            ${(payout.status || 'pending').charAt(0).toUpperCase() + (payout.status || 'pending').slice(1)}
                        </span>
                        ${payout.id ? `<p class="text-xs text-gray-500 mt-1">ID: ${payout.id}</p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function displayAllPaymentHistory(payments) {
            const container = document.getElementById('allPaymentHistory');
            
            if (!payments || payments.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 py-8">
                        <img src="../assets/icons/payment-history.png" alt="No payments" class="w-16 h-16 mx-auto mb-4 opacity-50">
                        <p>No payments yet</p>
                        <p class="text-sm mt-2">Your payment history will appear here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = payments.map(payment => `
                <div class="flex justify-between items-center p-4 bg-gray-700/50 rounded-lg hover:bg-gray-700/70 transition-colors">
                    <div class="flex items-center">
                        <img src="../assets/icons/payment-history.png" alt="Payment" class="w-8 h-8 mr-4">
                        <div>
                            <p class="font-medium text-white">${parseFloat(payment.bid_points || payment.amount || 0).toLocaleString()} coins - ${payment.recipient || payment.to || 'Unknown'} (${(payment.status || 'pending').charAt(0).toUpperCase() + (payment.status || 'pending').slice(1)})</p>
                            <p class="text-sm text-gray-400">${formatDate(payment.created_at || payment.date)}</p>
                            ${payment.description || payment.purpose ? `<p class="text-xs text-gray-500 mt-1">${payment.description || payment.purpose || 'Payment'}</p>` : ''}
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="px-3 py-1 text-xs rounded-full ${getStatusColor(payment.status)}">
                            ${(payment.status || 'pending').charAt(0).toUpperCase() + (payment.status || 'pending').slice(1)}
                        </span>
                        ${payment.transaction_id || payment.reference ? `<p class="text-xs text-gray-500 mt-1">Ref: ${payment.transaction_id || payment.reference}</p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tab + 'Tab').classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(tab + 'Content').classList.remove('hidden');
        }

        function getStatusColor(status) {
            switch(status?.toLowerCase()) {
                case 'completed':
                case 'success':
                case 'successful':
                case 'paid':
                    return 'bg-green-500/20 text-green-400';
                case 'pending':
                case 'processing':
                    return 'bg-yellow-500/20 text-yellow-400';
                case 'failed':
                case 'cancelled':
                case 'rejected':
                    return 'bg-red-500/20 text-red-400';
                default:
                    return 'bg-gray-500/20 text-gray-400';
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return 'Invalid Date';
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function goBack() {
            window.history.back();
        }

        function logout() {
            localStorage.removeItem('authToken');
            window.location.href = '../auth/login.html';
        }
    </script>

    <style>
        .tab-button {
            @apply text-gray-400 border-transparent hover:text-gray-300 hover:border-gray-300;
        }
        .tab-button.active {
            @apply text-primary border-primary;
        }
        
        /* Added mobile navigation styling */
        body {
            padding-bottom: 80px;
        }
        
        @media (min-width: 768px) {
            body {
                padding-bottom: 0;
            }
            
            nav {
                display: none;
            }
        }
    </style>
</body>
</html>
