<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CopUpBid — Favorites</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { cop: { bg:'#0b1022', teal:'#10b981', cyan:'#06b6d4', blue:'#2563eb', accent: '#f59e0b' } }
        }
      }
    }
  </script>
  <style>
    body{
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(16,185,129,.08), transparent 60%),
        radial-gradient(1000px 600px at 80% 20%, rgba(37,99,235,.08), transparent 65%),
        radial-gradient(1000px 800px at 50% 100%, rgba(6,182,212,.08), transparent 60%),
        #0b1022;
    }
    .glass{ background: linear-gradient(to bottom right, rgba(22,33,62,.6), rgba(14,23,46,.5)); backdrop-filter: blur(12px); }
    .ring-glow { box-shadow: 0 0 0 1px rgba(255,255,255,.08), 0 15px 40px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06); }
    .chip { border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03); }
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,.05), rgba(255,255,255,.15), rgba(255,255,255,.05)); background-size: 200% 100%; animation: sk 1.5s infinite; }
    @keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <!-- Header (same as shop.html) -->
  <header class="sticky top-0 z-40 border-b border-white/5 bg-[#0b1022]/85 backdrop-blur">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <!-- Left: Brand + Mobile Menu -->
        <div class="flex items-center gap-4">
          <button id="openDrawer" class="sm:hidden p-2 rounded-lg hover:bg-white/10 border border-white/10 transition-all duration-300">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <a href="javascript:history.back()" class="flex items-center gap-3">
            <img src="./icons/copupcoin.png" alt="CopUpBid Logo" class="h-9 w-9 rounded-full ring-1 ring-white/10" />
            <span class="font-semibold tracking-wide">CopUpBid</span>
          </a>
        </div>

        <!-- Center: Navigation (desktop) -->
        <nav class="hidden sm:flex items-center gap-8">
          <a href="./shop.html" class="text-sm font-medium text-white/80 hover:text-white transition">Shop</a>
          <a href="./categories.html" class="text-sm font-medium text-white/80 hover:text-white transition">Categories</a>
          <a href="./dashboard.html" class="text-sm font-medium text-white/80 hover:text-white transition">Dashboard</a>
        </nav>

        <!-- Right: Actions (favorites + cart) -->
        <div class="flex items-center gap-3">
          <a href="./favorites.html" class="relative p-2.5 rounded-lg hover:bg-white/10 border border-white/10 transition-all duration-300 group" aria-label="Favorites">
            <svg class="w-5 h-5 group-hover:text-cop-cyan transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            <span id="favBadge" class="absolute -top-2 -right-2 text-[10px] px-2 py-1 rounded-full bg-red-500 text-white font-bold hidden shadow-lg shadow-red-500/50">0</span>
          </a>
          <a href="./cart.html" class="relative p-2.5 rounded-lg hover:bg-white/10 border border-white/10 transition-all duration-300 group" aria-label="Cart">
            <svg class="w-5 h-5 group-hover:text-cop-cyan transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <span id="cartBadge" class="absolute -top-2 -right-2 text-[10px] px-2 py-1 rounded-full bg-cop-accent text-slate-900 font-bold hidden shadow-lg shadow-cop-accent/50">0</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Drawer (mobile, same as shop.html) -->
  <div id="drawerBackdrop" class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm hidden"></div>
  <aside id="drawer" class="fixed z-50 top-0 left-0 h-full w-72 p-4 glass ring-glow border border-white/10 drawer-enter hidden">
    <div class="flex items-center justify-between mb-6">
      <span class="font-bold text-lg">Menu</span>
      <button id="closeDrawer" class="p-2 rounded-lg hover:bg-white/5 border border-white/10 transition-all duration-300">✕</button>
    </div>
    <nav class="space-y-2">
      
      <a class="block px-4 py-3 rounded-lg hover:bg-white/5 border border-white/10 font-medium transition-all duration-300" href="./shop.html">Shop</a>
      <a class="block px-4 py-3 rounded-lg hover:bg-white/5 border border-white/10 font-medium transition-all duration-300" href="./categories.html">Categories</a>
      <a class="block px-4 py-3 rounded-lg hover:bg-cop-cyan/10 border border-white/10 font-medium transition-all duration-300 text-cop-cyan"href="./favorites.html">Favorites</a>
      <a class="block px-4 py-3 rounded-lg hover:bg-white/5 border border-white/10 font-medium transition-all duration-300" href="./cart.html">Cart</a>
      <a class="block px-4 py-3 rounded-lg hover:bg-white/5 border border-white/10 font-medium transition-all duration-300" href="./dashboard.html">Dashboard</a>
    </nav>
  </aside>

  <!-- Auth Banner (same behavior as shop.html) -->
  <div id="authBanner" class="hidden bg-gradient-to-r from-cop-blue/10 to-cop-cyan/10 border-b border-cop-cyan/20">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4 flex-col sm:flex-row">
      <p class="text-sm text-white/90 flex items-center gap-2">🔐 Guest mode: Some features require login.</p>
      <button id="quickToken" class="px-6 py-2.5 rounded-lg bg-gradient-to-r from-cop-teal to-cop-cyan text-slate-900 font-semibold text-sm hover:shadow-lg hover:shadow-cop-cyan/40 transition-all duration-300 hover:scale-105">Paste Token</button>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 py-12">
    <div class="mb-8">
      <h1 class="text-3xl font-bold">Your Favorites</h1>
      <p class="text-white/60 mt-2">Items you've marked for later</p>
    </div>
    <div id="grid" class="grid sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
    <div id="emptyState" class="hidden mt-16 text-center py-12 text-white/70">
      <p class="text-lg mb-6">No favorites yet</p>
      <a href="./shop.html" class="inline-block px-6 py-3 rounded-lg bg-gradient-to-r from-cop-teal to-cop-cyan text-slate-900 font-bold hover:shadow-lg transition">Start Shopping →</a>
    </div>
  </main>

  <!-- Toast (same style logic as shop) -->
  <div id="toast" class="fixed bottom-4 right-4 hidden px-5 py-3 rounded-lg glass ring-glow text-sm font-medium max-w-sm backdrop-blur-xl"></div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const API_BASE = 'https://api.copup.copupbid.com/api/users';
    const api = axios.create({ baseURL: API_BASE.replace(/\/$/, ''), timeout: 15000 });
    api.interceptors.request.use(cfg => {
      const t = (localStorage.getItem('authToken') || '').trim();
      if (t) cfg.headers.Authorization = 'Bearer ' + t;
      return cfg;
    });

    const fmtN = n => (n == null ? '—' : Intl.NumberFormat('en-NG').format(Number(n)));

    const toast = (msg, kind='info') => {
      const el = document.getElementById('toast'); if (!el) return;
      el.textContent = msg;
      el.classList.remove('hidden');
      el.style.background = kind === 'error'
        ? 'rgba(220,38,38,.15)'
        : 'linear-gradient(to bottom right, rgba(22,33,62,.7), rgba(14,23,46,.6))';
      el.style.borderColor = kind === 'error'
        ? 'rgba(239,68,68,.4)'
        : 'rgba(16,185,129,.2)';
      setTimeout(()=> el.classList.add('hidden'), 3500);
    };

    const tokenExists = () => !!(localStorage.getItem('authToken') || '').trim();
    const showAuthBanner = () => {
      if (!tokenExists()) document.getElementById('authBanner')?.classList.remove('hidden');
    };

    function setBadge(id, n){
      const el = document.getElementById(id);
      if (!el) return;
      if (n > 0) {
        el.textContent = n;
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    }

    function refreshBadges(){
      setBadge('cartBadge', Number(localStorage.getItem('cartCount') || '0'));
      setBadge('favBadge', Number(localStorage.getItem('favCount') || '0'));
    }

    const fetchFavorites = async () => (await api.get('/favorites')).data || [];
    const toggleFavorite = async (productId) => (await api.post(`/favorites/${productId}/toggle`)).data;

    const card = (p) => {
      const el = document.createElement('div');
      el.className = 'rounded-2xl glass ring-glow overflow-hidden flex flex-col group';
      el.innerHTML = `
        <a href="./product.html?id=${p.id}" class="block aspect-video bg-black/30 overflow-hidden">
          <img src="${p.image_url || ''}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300"/>
        </a>
        <div class="p-5 flex-1 flex flex-col">
          <h3 class="font-bold text-lg line-clamp-2 group-hover:text-cop-cyan transition">${p.name}</h3>
          <p class="text-white/60 text-sm mt-2">Favorited ${p.favorited_at ? new Date(p.favorited_at).toLocaleDateString() : ''}</p>
          <div class="mt-4 flex gap-2">
            <span class="chip px-3 py-1 rounded-lg text-sm">💵 ₦${fmtN(p.cash_price)}</span>
            <span class="chip px-3 py-1 rounded-lg text-sm">🏁 ${fmtN(p.auction_price)}</span>
          </div>
          <div class="mt-4 flex gap-2">
            <a href="./product.html?id=${p.id}" class="flex-1 px-3 py-2 rounded-lg bg-gradient-to-r from-cop-teal to-cop-cyan text-slate-900 font-bold text-sm text-center hover:shadow-lg transition">View</a>
            <button class="px-3 py-2 rounded-lg border border-white/20 hover:bg-white/5 transition font-medium remove-btn">Remove</button>
          </div>
        </div>`;
      el.querySelector('.remove-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        try {
          const res = await toggleFavorite(p.id);
          if (res.toggled === 'removed') {
            toast('Removed from favorites');
            const n = Math.max(0, Number(localStorage.getItem('favCount') || '0') - 1);
            localStorage.setItem('favCount', n);
            refreshBadges();
            el.remove();
            afterRenderCheck();
          }
        } catch (err) {
          if (err?.response?.status === 401) toast('Please login','error');
          else toast(err?.response?.data?.message || 'Failed','error');
        }
      });
      return el;
    };

    function afterRenderCheck(){
      const grid = document.getElementById('grid');
      const empty = document.getElementById('emptyState');
      const n = grid.children.length;
      empty.classList.toggle('hidden', n > 0);
    }

    async function load(){
      try {
        const list = await fetchFavorites();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        list.forEach(p => grid.appendChild(card(p)));
        localStorage.setItem('favCount', list.length);
        refreshBadges();
        afterRenderCheck();
      } catch (err) {
        document.getElementById('grid').innerHTML = '';
        document.getElementById('emptyState').classList.remove('hidden');
        if (err?.response?.status === 401) toast('Please login','error');
        else toast(err?.response?.data?.message || 'Failed','error');
      }
    }

    // Drawer + token events (same behavior as shop page)
    function openDrawer(){
      document.getElementById('drawerBackdrop').classList.remove('hidden');
      const d = document.getElementById('drawer');
      d.classList.remove('hidden');
      requestAnimationFrame(()=> d.classList.add('drawer-open'));
    }
    function closeDrawer(){
      const d = document.getElementById('drawer');
      d.classList.remove('drawer-open');
      setTimeout(()=>{
        d.classList.add('hidden');
        document.getElementById('drawerBackdrop').classList.add('hidden');
      }, 200);
    }

    window.addEventListener('DOMContentLoaded', () => {
      refreshBadges();
      showAuthBanner();
      load();

      document.getElementById('openDrawer')?.addEventListener('click', openDrawer);
      document.getElementById('closeDrawer')?.addEventListener('click', closeDrawer);
      document.getElementById('drawerBackdrop')?.addEventListener('click', closeDrawer);

      document.getElementById('quickToken')?.addEventListener('click', ()=> {
        const t = prompt('Paste token:');
        if (t){
          localStorage.setItem('authToken', t.trim());
          location.reload();
        }
      });
    });
  </script>
</body>
</html>
