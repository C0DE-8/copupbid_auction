<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Quests</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Removed max-w-sm constraint and made container full width with responsive padding -->
    <div class="w-full min-h-screen p-4 md:p-8 lg:p-12">
        <!-- Header -->
        <div class="flex justify-between items-start mb-8 md:mb-12">
            <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold leading-tight">
                Choose<br>
                your quests
            </h1>
            <button class="bg-gray-700 hover:bg-gray-600 rounded-full p-3 md:p-4 transition-colors">
                <div class="grid grid-cols-2 gap-1">
                    <div class="w-2 h-2 md:w-3 md:h-3 bg-white rounded-full"></div>
                    <div class="w-2 h-2 md:w-3 md:h-3 bg-white rounded-full"></div>
                    <div class="w-2 h-2 md:w-3 md:h-3 bg-white rounded-full"></div>
                    <div class="w-2 h-2 md:w-3 md:h-3 bg-white rounded-full"></div>
                </div>
            </button>
        </div>

        <!-- Made grid responsive with more columns on larger screens and increased gap -->
        <!-- Quest Cards Grid -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 lg:gap-8 max-w-7xl mx-auto">
            <!-- Significantly increased card heights to match original image proportions -->
            <!-- Coin Vault Card -->
            <div class="bg-gradient-to-br from-blue-400 to-blue-600 rounded-3xl p-6 md:p-8 relative overflow-hidden row-span-2 md:col-span-1 lg:col-span-2 min-h-[400px] md:min-h-[600px] lg:min-h-[700px]">
                <!-- Stars -->
                <div class="flex gap-1 mb-6">
                    <span class="text-yellow-300 text-xl md:text-2xl">★★★★</span>
                </div>
                
                <!-- Coin Badge -->
                <div class="bg-white text-black px-4 py-2 md:px-6 md:py-3 rounded-lg inline-flex items-center gap-2 mb-6">
                    <div class="w-8 h-8 md:w-10 md:h-10 bg-gray-400 rounded-full"></div>
                    <span class="font-bold text-2xl md:text-3xl">100</span>
                </div>

                <!-- Character Placeholder -->
                <div class="absolute bottom-0 right-0 w-40 h-48 md:w-48 md:h-60 lg:w-56 lg:h-72 bg-purple-400 rounded-tl-3xl opacity-80"></div>
                
                <!-- Bottom Text -->
                <div class="absolute bottom-6 left-6 bg-white text-black px-4 py-3 md:px-6 md:py-4 rounded-lg">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 md:w-10 md:h-10 bg-blue-500 rounded"></div>
                        <div>
                            <div class="font-bold text-base md:text-lg">Coin Vault</div>
                            <div class="text-sm md:text-base text-gray-600">P2P buy & sell.</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Made riddle card much taller to match original proportions -->
            <!-- Riddle Card -->
            <div class="bg-gradient-to-br from-pink-400 to-purple-500 rounded-3xl p-6 md:p-8 relative overflow-hidden min-h-[200px] md:min-h-[280px] lg:min-h-[340px]">
                <!-- Stars -->
                <div class="flex gap-1 mb-4">
                    <span class="text-yellow-300 text-lg md:text-xl">★★★★</span>
                </div>
                
                <!-- Text -->
                <p class="text-white font-semibold text-base md:text-lg leading-tight">
                    Solve the riddle to claim the prize.
                </p>

                <!-- Character Placeholder -->
                <div class="absolute bottom-0 right-0 w-24 h-32 md:w-32 md:h-40 lg:w-36 lg:h-44 bg-pink-300 rounded-tl-2xl opacity-80"></div>
            </div>

            <!-- Made trade card much taller to match original proportions -->
            <!-- Trade Card -->
            <div class="bg-gradient-to-br from-green-400 to-green-600 rounded-3xl p-6 md:p-8 relative overflow-hidden min-h-[200px] md:min-h-[280px] lg:min-h-[340px]">
                <!-- Stars -->
                <div class="flex gap-1 mb-4">
                    <span class="text-yellow-300 text-lg md:text-xl">★★★★</span>
                </div>
                
                <!-- Text -->
                <p class="text-white font-semibold text-base md:text-lg leading-tight">
                    Trade with users.
                </p>

                <!-- Character Placeholder -->
                <div class="absolute bottom-0 right-0 w-24 h-32 md:w-32 md:h-40 lg:w-36 lg:h-44 bg-green-300 rounded-tl-2xl opacity-80"></div>
            </div>
        </div>

        <!-- Made auctions card significantly taller and more prominent -->
        <!-- Auctions Card -->
        <div class="bg-gradient-to-br from-gray-700 to-gray-800 rounded-3xl p-6 md:p-8 relative overflow-hidden mt-6 md:mt-8 max-w-7xl mx-auto min-h-[200px] md:min-h-[280px] lg:min-h-[320px]">
            <!-- Stars -->
            <div class="flex gap-1 mb-6">
                <span class="text-yellow-300 text-xl md:text-2xl">★★★</span>
                <span class="text-gray-500 text-xl md:text-2xl">★</span>
            </div>
            
            <!-- Text -->
            <div class="mb-6">
                <h3 class="text-white font-bold text-2xl md:text-3xl mb-2">Auctions</h3>
                <p class="text-gray-300 text-base md:text-lg">Browse & place bids.</p>
            </div>

            <!-- Character Placeholder -->
            <div class="absolute bottom-0 right-0 w-32 h-36 md:w-40 md:h-44 lg:w-48 lg:h-52 bg-gray-600 rounded-tl-3xl opacity-80"></div>
        </div>
    </div>
</body>
</html>
